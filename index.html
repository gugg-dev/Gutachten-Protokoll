<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─────────────────────────────────────────────────────────────
// KONSTANTEN
// ─────────────────────────────────────────────────────────────
const GUTACHTER    = "Arch DI Florian Guggenbichler";
const SPEICHER_KEY = "gutachten_v2";

const SCHADENSARTEN = [
  "Leitungswasser","Wasserschaden","Brandschaden","Sturmschaden","Einbruchschaden",
  "Frostschaden","Schimmelschaden","Hagelschaden","Blitzschaden",
  "Baumangel","E-Geräte","Glas","Unbekannt","Haftpflicht","Sonstiges"
];
const UNTERKATEGORIEN = {
  "Leitungswasser":  ["Ablaufrohrgebrechen","Druckrohrgebrechen","Frostschaden","Kanalgebrechen","Kanalrückstau","Leitungswasser","Verstopfung"],
  "Brandschaden":    ["Brand","Blitzschlag","Explosion","Sengschaden","Indirekter Blitzschlag","Überspannung","Verpuffung","Offenes Feuer"],
  "Sturmschaden":    ["Dachlawine","Hagel","Sturm","Erdrutsch","Vermurung","Erdbeben","Felssturz","Hochwasser","Niederschlag","Oberflächenwasser","Rückstau","Schmelzwasser","Schneedruck","Überschwemmung"],
  "Hagelschaden":    ["Dachlawine","Hagel","Sturm","Erdrutsch","Vermurung","Erdbeben","Felssturz","Hochwasser","Niederschlag","Oberflächenwasser","Rückstau","Schmelzwasser","Schneedruck","Überschwemmung"],
  "Glas":            ["Gebäudeverglasung","Kunststoffverglasung","Kunstverglasung","Terrassenverglasung","Cerankochfeld","Verglasung von PV Anlagen","Spiegel"],
  "Einbruchschaden": ["Beraubung","Einbruchdiebstahl","Einfacher Diebstahl","Fahrraddiebstahl","Vandalismus","Versuchter Einbruch"],
  "Haftpflicht":     ["KFZ-Haftpflicht","Allg. Haftpflicht","Betriebshaftpflicht"],
};
const RAEUME = [
  "Wohnzimmer","Schlafzimmer","Küche","Bad / WC","Flur / Diele","Keller",
  "Dachboden","Garage","Kinderzimmer","Arbeitszimmer","Esszimmer","Abstellraum",
  "Balkon / Terrasse","Außenfassade","Dach","Sonstige"
];
const ROLLEN = [
  "Versicherungsnehmer","Anspruchsteller","Mieter","Eigentümer","Verwalter",
  "Handwerker","Zeuge","Gutachter","Rechtsanwalt","Makler","Sonstige"
];
const MATERIALIEN = [
  "Parkett","Massivparkett","Laminat","Vinyl","Fliesen","Naturstein",
  "Teppich","Estrich","Putz / Wandfarbe","Tapete","Mauerwerk","Holz","Metall","Glas",
  "Dämmung","Vorsatzschale Trockenbau","Rohre / Leitungen","Elektrik",
  "Türe Holz","Türe Metall","Raffstore Alu","Raffstore Kunststoff","Rollladen","Markise",
  "Druckführende Leitung","Abflussrohr","Muffe","Dichtung","Eckventil",
  "Verbundabdichtung","Armatur Dusche","Armatur Becken","Fußbodenheizung","Sonstige"
];
const HANDWERKSBETRIEBE = [
  "Installateur","Elektriker","Spengler","Dachdecker","Baumeister","Bodenleger",
  "Brandschadensanierer","Fensterfirma","Glaser","Maler","Schlosser",
  "Sonnenschutz","Tischler","Trocknung","Trockenbau","Zimmerer"
];
const AUFTRAGGEBER = ["UNIQA","Wiener Städtische Versicherung","Donau Versicherung","Tiroler Versicherung"];
const OBJEKTARTEN  = ["Inventar","Mehrparteienhaus","Ein- Zweifamilienhaus","Gewerbebetrieb","Einfriedung","Fluren u. Kulturen"];
const OPT_FELDER   = ["Ursacheneruierung","Schadensbeschreibung"];

// ─────────────────────────────────────────────────────────────
// DATEN STRUKTUR
// ─────────────────────────────────────────────────────────────
const GESCHOSSE = ["Tiefgarage","KG","EG","OG 1","OG 2","OG 3","OG 4","OG 5","OG 6","OG 7","OG 8","OG 9"];

const STATUS_OPTS = ["Partner","Freund","Kind","Elternteil","Mieter","Eigentümer","Verwalter","Sonstige"];

const neuerSchaden = () => ({
  top:"", geschoss:"",
  positionstyp:"",
  folgeschaden_beschreibung:"",
  skizzeOffen: false,
  personen:[],
  raeume:[], materialien:[], flaechen:[],
  ursache:"", angabenVorOrt:"", beschreibung:"", skizze:"", massnahmen:"",
  trocknung_vorhanden:"", trocknung_art:[], feuchtigkeitswerte:"",
  sanierung_partiell:"",
  sanierung_ausmass:"",
  leckortung:"",
  firmen:[],
  extraFelder:[],
  freitextFelder:[]
});

const neueDaten = () => ({
  nr:"", auftraggeber:"",
  datum: new Date().toISOString().slice(0,10),
  schadendatum:"", besichtigungszustand:"",
  gutachter: GUTACHTER,
  objekt:[], adresse:"",
  baujahr:"", gebaeudezustand:"",
  // Leitungswasser-spezifische Felder
  anwesenheit72h:"", behoerdliche_aufnahme:"", bewohnt:"",
  auftragsart:[], alter_ursache:"", zustand_ursache:"", regressmoeglichkeit:"", regressFreitext:"",
  partnerfirma:"", partnerfirma_sonstige:"",
  schadensart:[], schadensart_sub:[],
  anwesende:[], schaeden:[neuerSchaden()], bemerkungen:""
});

// ─────────────────────────────────────────────────────────────
// LOCAL STORAGE  – robuste Migration alter Datenformate
// ─────────────────────────────────────────────────────────────
function toArr(v) {
  // Wandelt beliebigen Wert sicher in ein Array um
  if (!v) return [];
  if (Array.isArray(v)) return v;
  if (typeof v === "string" && v.trim()) return v.split(", ").filter(Boolean);
  return [];
}

function ladeDaten() {
  try {
    const raw = localStorage.getItem(SPEICHER_KEY);
    if (!raw) return neueDaten();
    const d = JSON.parse(raw);
    const basis = neueDaten();
    return {
      ...basis,
      ...d,
      // Sicherheitsmigration aller Array-Felder
      objekt:         toArr(d.objekt),
      schadensart:    toArr(d.schadensart),
      schadensart_sub:toArr(d.schadensart_sub),
      anwesende:      Array.isArray(d.anwesende) ? d.anwesende : [],
      // Neue String-Felder mit Fallback
      baujahr:              d.baujahr||"",
      gebaeudezustand:      d.gebaeudezustand||"",
      anwesenheit72h:       d.anwesenheit72h||"",
      behoerdliche_aufnahme:d.behoerdliche_aufnahme||"",
      bewohnt:              d.bewohnt||"",
      auftragsart:          Array.isArray(d.auftragsart)?d.auftragsart:[],
      alter_ursache:        d.alter_ursache||"",
      zustand_ursache:      d.zustand_ursache||"",
      regressmoeglichkeit:  d.regressmoeglichkeit||"",
      regressFreitext:      d.regressFreitext||"",
      partnerfirma:         d.partnerfirma||"",
      partnerfirma_sonstige:d.partnerfirma_sonstige||"",
      schaeden:       Array.isArray(d.schaeden) && d.schaeden.length > 0
                        ? d.schaeden.map(s => ({ ...neuerSchaden(), ...s,
                            top:              s.top||"",
                            geschoss:         s.geschoss||"",
                            positionstyp:     s.positionstyp||"",
                            folgeschaden_beschreibung: s.folgeschaden_beschreibung||"",
                            alter_material:   s.alter_material||"",
                            skizzeOffen:      s.skizzeOffen||false,
                            sanierung_partiell: s.sanierung_partiell||"",
                            sanierung_ausmass:  s.sanierung_ausmass||"",
                            leckortung:         s.leckortung||"",
                            firmen: Array.isArray(s.firmen) ? s.firmen
                              : (s.ursache_firma||s.ursache_handwerk
                                  ? [{name:s.ursache_firma||"", handwerk:s.ursache_handwerk||""}]
                                  : []),
                            personen: Array.isArray(s.personen) ? s.personen
                              : (s.personName ? [{name:s.personName||"", status:s.personStatus||"", statusFreitext:s.personStatusFreitext||""}] : []),
                            angabenVorOrt: s.angabenVorOrt||"",
                            raeume:      toArr(s.raeume),
                            materialien: toArr(s.materialien),
                            flaechen:    Array.isArray(s.flaechen) ? s.flaechen : [],
                            trocknung_vorhanden: s.trocknung_vorhanden||"",
                            trocknung_art:       Array.isArray(s.trocknung_art)?s.trocknung_art:[],
                            extraFelder: toArr(s.extraFelder),
                            freitextFelder: Array.isArray(s.freitextFelder) ? s.freitextFelder : [],
                          }))
                        : [neuerSchaden()],
    };
  } catch(e) {
    console.warn("Lade-Fehler, nutze neue Daten:", e);
    return neueDaten();
  }
}

function speichereDaten(daten) {
  try { localStorage.setItem(SPEICHER_KEY, JSON.stringify(daten)); } catch(e) {
    console.warn("Speicher-Fehler:", e);
  }
}

// ─────────────────────────────────────────────────────────────
// WORD EXPORT – JSZip + OOXML (echtes .docx, funktioniert auf allen Geräten)
// ─────────────────────────────────────────────────────────────
async function exportiereWord(daten) {
  const heute = new Date().toLocaleDateString("de-AT",{day:"2-digit",month:"2-digit",year:"numeric"});

  const ka  = x => {
    if (x == null) return "–";
    const s = Array.isArray(x) ? x.join(", ") : String(x);
    return s.trim() || "–";
  };
  const kaA = a => {
    if (!a) return "–";
    if (Array.isArray(a)) return a.length ? a.join(", ") : "–";
    return String(a).trim() || "–";
  };
  const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  // ── OOXML Hilfsfunktionen ──
  function wRow(label, value) {
    const v = esc(value||"–");
    const l = esc(label);
    return `<w:tr>
      <w:tc><w:tcPr><w:tcW w:w="2400" w:type="dxa"/><w:shd w:val="clear" w:color="auto" w:fill="EEF0F3"/><w:tcBorders><w:top w:val="single" w:sz="4" w:color="CCCCCC"/><w:left w:val="single" w:sz="4" w:color="CCCCCC"/><w:bottom w:val="single" w:sz="4" w:color="CCCCCC"/><w:right w:val="single" w:sz="4" w:color="CCCCCC"/></w:tcBorders></w:tcPr>
        <w:p><w:pPr><w:spacing w:before="40" w:after="40"/></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="18"/><w:szCs w:val="18"/></w:rPr><w:t xml:space="preserve">${l}</w:t></w:r></w:p></w:tc>
      <w:tc><w:tcPr><w:tcW w:w="6480" w:type="dxa"/><w:tcBorders><w:top w:val="single" w:sz="4" w:color="CCCCCC"/><w:left w:val="single" w:sz="4" w:color="CCCCCC"/><w:bottom w:val="single" w:sz="4" w:color="CCCCCC"/><w:right w:val="single" w:sz="4" w:color="CCCCCC"/></w:tcBorders></w:tcPr>
        <w:p><w:pPr><w:spacing w:before="40" w:after="40"/></w:pPr><w:r><w:rPr><w:sz w:val="18"/><w:szCs w:val="18"/></w:rPr><w:t xml:space="preserve">${v}</w:t></w:r></w:p></w:tc>
    </w:tr>`;
  }

  function wHeader(text) {
    return `<w:tr>
      <w:tc><w:tcPr><w:gridSpan w:val="2"/><w:shd w:val="clear" w:color="auto" w:fill="1E3A5F"/><w:tcBorders><w:top w:val="none" w:sz="0" w:color="auto"/><w:left w:val="none" w:sz="0" w:color="auto"/><w:bottom w:val="none" w:sz="0" w:color="auto"/><w:right w:val="none" w:sz="0" w:color="auto"/></w:tcBorders></w:tcPr>
        <w:p><w:pPr><w:spacing w:before="80" w:after="80"/></w:pPr><w:r><w:rPr><w:b/><w:color w:val="FFFFFF"/><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr><w:t>${esc(text)}</w:t></w:r></w:p></w:tc>
    </w:tr>`;
  }

  function sektion(titel, zeilen) {
    return `<w:tbl><w:tblPr><w:tblW w:w="8880" w:type="dxa"/><w:tblBorders><w:insideH w:val="single" w:sz="4" w:color="CCCCCC"/><w:insideV w:val="single" w:sz="4" w:color="CCCCCC"/></w:tblBorders></w:tblPr><w:tblGrid><w:gridCol w:w="2400"/><w:gridCol w:w="6480"/></w:tblGrid>
      ${wHeader(titel)}${zeilen}</w:tbl>
    <w:p><w:pPr><w:spacing w:before="120" w:after="0"/></w:pPr></w:p>`;
  }

  function bildRel(rId) {
    return `<w:tr>
      <w:tc><w:tcPr><w:tcW w:w="2400" w:type="dxa"/><w:shd w:val="clear" w:color="auto" w:fill="EEF0F3"/><w:tcBorders><w:top w:val="single" w:sz="4" w:color="CCCCCC"/><w:left w:val="single" w:sz="4" w:color="CCCCCC"/><w:bottom w:val="single" w:sz="4" w:color="CCCCCC"/><w:right w:val="single" w:sz="4" w:color="CCCCCC"/></w:tcBorders></w:tcPr>
        <w:p><w:r><w:rPr><w:b/><w:sz w:val="18"/></w:rPr><w:t>Skizze</w:t></w:r></w:p></w:tc>
      <w:tc><w:tcPr><w:tcW w:w="6480" w:type="dxa"/><w:tcBorders><w:top w:val="single" w:sz="4" w:color="CCCCCC"/><w:left w:val="single" w:sz="4" w:color="CCCCCC"/><w:bottom w:val="single" w:sz="4" w:color="CCCCCC"/><w:right w:val="single" w:sz="4" w:color="CCCCCC"/></w:tcBorders></w:tcPr>
        <w:p><w:r><w:drawing><wp:inline><wp:extent cx="4572000" cy="2600000"/><wp:docPr id="1" name="Skizze"/><a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:nvPicPr><pic:cNvPr id="1" name="Skizze"/><pic:cNvPicPr/></pic:nvPicPr><pic:blipFill><a:blip r:embed="${rId}"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill><pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="4572000" cy="2600000"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr></pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:r></w:p></w:tc>
    </w:tr>`;
  }

  // ── Daten aufbereiten ──
  const anwArr  = Array.isArray(daten.anwesende) ? daten.anwesende : [];
  const posP    = (daten.schaeden||[]).flatMap(s =>
    (s.personen||[]).filter(p=>p.name&&p.name.trim()).map(p=>({
      name: p.name.trim(),
      rolle: p.status==="Sonstige"&&p.statusFreitext ? p.statusFreitext.trim() : (p.status||"Anwesend"),
      top: s.top||""
    }))
  );
  const namen   = new Set(anwArr.map(p=>p.name));
  const alleAnw = [...anwArr, ...posP.filter(p=>!namen.has(p.name))];

  const hatLW   = (daten.schadensart||[]).includes("Leitungswasser");
  const schadenArr = Array.isArray(daten.schaeden) ? daten.schaeden : [];

  // ── Bilder sammeln (base64 → Uint8Array) ──
  const images = [];
  schadenArr.forEach((s,i) => {
    if (s.skizze && s.skizze.startsWith("data:")) {
      try {
        const b64 = s.skizze.split(",")[1];
        const bin = atob(b64);
        const arr = new Uint8Array(bin.length);
        for (let k=0;k<bin.length;k++) arr[k]=bin.charCodeAt(k);
        images.push({ posIdx: i, data: arr, rId: `rId${100+i}` });
      } catch(e) {}
    }
  });

  // ── XML-Body aufbauen ──
  let body = "";

  // Titel-Absatz
  const objTitel = esc(kaA(daten.objekt) !== "–" ? kaA(daten.objekt) : "Besichtigungsprotokoll");
  body += `<w:p><w:pPr><w:spacing w:before="0" w:after="120"/></w:pPr>
    <w:r><w:rPr><w:b/><w:sz w:val="40"/><w:szCs w:val="40"/></w:rPr><w:t>${objTitel}</w:t></w:r></w:p>
  <w:p><w:pPr><w:spacing w:before="0" w:after="60"/></w:pPr>
    <w:r><w:rPr><w:color w:val="555555"/><w:sz w:val="18"/></w:rPr><w:t>BESICHTIGUNGSPROTOKOLL  ·  ${esc(ka(daten.adresse))}</w:t></w:r></w:p>
  <w:p><w:pPr><w:spacing w:before="0" w:after="200"/></w:pPr></w:p>`;

  // Auftragsdaten
  body += sektion("Auftragsdaten",
    wRow("Schadennummer",        ka(daten.nr)) +
    wRow("Auftragsart",         kaA(daten.auftragsart)) +
    wRow("Auftraggeber",         ka(daten.auftraggeber)) +
    wRow("Besichtigungsdatum",   ka(daten.datum)) +
    wRow("Schadendatum",         ka(daten.schadendatum)) +
    wRow("Besichtigungszustand", ka(daten.besichtigungszustand)) +
    wRow("Sachverstaendiger",    ka(daten.gutachter))
  );

  // Objekt
  let objZeilen = wRow("Objektbezeichnung", kaA(daten.objekt)) +
    wRow("Adresse",       ka(daten.adresse)) +
    wRow("Baujahr",       ka(daten.baujahr));
  if (daten.baujahr && parseInt(daten.baujahr) > 1800)
    objZeilen += wRow("Gebaeudealter", String(new Date().getFullYear()-parseInt(daten.baujahr))+" Jahre");
  objZeilen += wRow("Gebaeudezustand", ka(daten.gebaeudezustand));
  body += sektion("Objekt", objZeilen);

  // LW
  if (hatLW && daten.anwesenheit72h)
    body += sektion("Anwesenheit 72 Stunden", wRow("Anwesenheit 72 Stunden", ka(daten.anwesenheit72h)));

  // Weitere Angaben
  body += sektion("Weitere Angaben",
    wRow("Behoerdliche Aufnahme", ka(daten.behoerdliche_aufnahme)) +
    wRow("Bewohnt",               ka(daten.bewohnt)) +
    wRow("Alter der Ursache",     ka(daten.alter_ursache)) +
    wRow("Zustand der Ursache",   ka(daten.zustand_ursache)) +
    wRow("Regressmoeglichkeit",   ka(daten.regressmoeglichkeit)) +
    wRow("Regress Eroerterung",  ka(daten.regressFreitext)) +
    wRow("Partnerfirma",          daten.partnerfirma==="Sonstige" ? ka(daten.partnerfirma_sonstige) : ka(daten.partnerfirma))
  );

  // Anwesende
  const anwZeilen = alleAnw.length
    ? alleAnw.map(p => wRow([p.rolle,p.top].filter(Boolean).join(" / "), p.name)).join("")
    : wRow("Anwesende Personen","–");
  body += sektion("Anwesende Personen", anwZeilen);

  // Schadensart
  body += sektion("Schadensart",
    wRow("Schadensart",    kaA(daten.schadensart)) +
    wRow("Unterkategorie", kaA(daten.schadensart_sub))
  );

  // Schadenpositionen
  schadenArr.forEach((s,i) => {
    const istPos1 = i===0;
    const extra   = Array.isArray(s.extraFelder) ? s.extraFelder : [];
    const flArr   = (s.flaechen||[]).filter(f=>f.typ||f.m2);
    const flText  = flArr.length ? flArr.map(f=>{
      const abm  = f.raumL&&f.raumB ? ` (${f.raumL}×${f.raumB}m)` : "";
      const hoehe = f.hoehe==="__custom__" ? (f.hoeheFreitext ? ` H:${f.hoeheFreitext}m` : "") : (f.hoehe ? ` H:${f.hoehe}` : "");
      return `${f.typ||"–"}: ${f.m2||0} m2${abm}${hoehe}`;
    }).join(", ") : "–";
    const hatU    = istPos1 || extra.includes("Ursacheneruierung");
    const hatB    = istPos1 || extra.includes("Schadensbeschreibung");

    const persTxt = (s.personen||[]).length
      ? (s.personen||[]).map(p => {
          const st = p.status==="Sonstige" && p.statusFreitext ? p.statusFreitext : (p.status||"");
          return p.name + (st ? " ("+st+")" : "");
        }).join(", ")
      : "–";
    let z = wRow("TOP / Wohnung",          ka(s.top)) +
            wRow("Geschoss",               ka(s.geschoss)) +
            wRow("Anwesende Personen",     persTxt) +
            wRow("Betroffene Raeume",      kaA(s.raeume)) +
            wRow("Materialien / Bauteile", kaA(s.materialien)) +
            wRow("Zu sanierende Flaechen", flText);
    if (hatU) { z += wRow("Angaben vor Ort", ka(s.angabenVorOrt)); z += wRow("Ursacheneruierung", ka(s.ursache)); }
    if (hatB)   z += wRow("Schadensbeschreibung", ka(s.beschreibung));
    (s.freitextFelder||[]).forEach(ft => { z += wRow(ft.label||"Freitext", ka(ft.text)); });
    const trocknungArt = (s.trocknung_art||[]).length ? " – " + s.trocknung_art.join(", ") : "";
    const trocknungTxt = s.trocknung_vorhanden==="Ja"
      ? "Vorhanden und in Betrieb" + trocknungArt
      : s.trocknung_vorhanden==="Empfohlen"
        ? "Technisch erforderlich, noch nicht ausgefuehrt" + trocknungArt
        : (s.trocknung_vorhanden||"–");
    z += wRow("Technische Trocknung", trocknungTxt);
    z += wRow("Massnahmen", ka(s.massnahmen));

    // Skizze
    const imgEntry = images.find(img => img.posIdx === i);
    z += imgEntry ? bildRel(imgEntry.rId) : wRow("Skizze","–");

    body += sektion(`Schadensposition ${i+1}`, z);
  });

  // Bemerkungen
  body += sektion("Allgemeine Bemerkungen", wRow("Bemerkungen", ka(daten.bemerkungen)));

  // Unterschriften
  body += `<w:p><w:pPr><w:spacing w:before="480" w:after="0"/></w:pPr></w:p>
  <w:tbl><w:tblPr><w:tblW w:w="8880" w:type="dxa"/><w:tblBorders><w:top w:val="none"/><w:left w:val="none"/><w:bottom w:val="none"/><w:right w:val="none"/><w:insideH w:val="none"/><w:insideV w:val="none"/></w:tblBorders></w:tblPr>
    <w:tblGrid><w:gridCol w:w="2960"/><w:gridCol w:w="2960"/><w:gridCol w:w="2960"/></w:tblGrid>
    <w:tr>${["Datum und Ort","Unterschrift Sachverstaendiger","Unterschrift Anwesende"].map(t=>`
      <w:tc><w:tcPr><w:tcW w:w="2960" w:type="dxa"/><w:tcBorders><w:top w:val="single" w:sz="12" w:color="999999"/><w:left w:val="none"/><w:bottom w:val="none"/><w:right w:val="none"/></w:tcBorders></w:tcPr>
        <w:p><w:pPr><w:spacing w:before="80" w:after="0"/></w:pPr><w:r><w:rPr><w:color w:val="777777"/><w:sz w:val="16"/></w:rPr><w:t>${t}</w:t></w:r></w:p></w:tc>`).join("")}
    </w:tr></w:tbl>
  <w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="240" w:after="0"/></w:pPr>
    <w:r><w:rPr><w:color w:val="AAAAAA"/><w:sz w:val="14"/></w:rPr><w:t>Erstellt am ${esc(heute)}  ·  ${esc(ka(daten.nr))}  ·  ${esc(GUTACHTER)}</w:t></w:r></w:p>`;

  // ── Bild-Relationships für document.xml.rels ──
  const imageRels = images.map(img =>
    `<Relationship Id="${img.rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/img_${img.posIdx}.png"/>`
  ).join("\n");

  // ── OOXML Dokument zusammenbauen ──
  const docXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"
  xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006"
  xmlns:o="urn:schemas-microsoft-com:office:office"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
  xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math"
  xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"
  xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml"
  mc:Ignorable="w14">
<w:body>
${body}
<w:sectPr>
  <w:pgSz w:w="11906" w:h="16838" w:orient="portrait"/>
  <w:pgMar w:top="720" w:right="720" w:bottom="720" w:left="720"/>
</w:sectPr>
</w:body></w:document>`;

  const relsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
  ${imageRels}
</Relationships>`;

  const stylesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:docDefaults><w:rPrDefault><w:rPr>
    <w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/>
    <w:sz w:val="20"/><w:szCs w:val="20"/>
  </w:rPr></w:rPrDefault></w:docDefaults>
</w:styles>`;

  const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Default Extension="png" ContentType="image/png"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>
</Types>`;

  const rootRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

  // ── ZIP zusammenbauen mit JSZip ──
  const DOCX_MIME = "application/vnd.openxmlformats-officedocument.wordprocessingml.document";
  const dateiname = `${(daten.nr||"Entwurf").replace(/[^a-zA-Z0-9\-]/g,"_")}.docx`;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);

  try {
    if (typeof JSZip === "undefined") throw new Error("JSZip nicht geladen");
    const zip = new JSZip();
    zip.file("[Content_Types].xml", contentTypes);
    zip.file("_rels/.rels", rootRels);
    zip.file("word/document.xml", docXml);
    zip.file("word/styles.xml", stylesXml);
    zip.file("word/_rels/document.xml.rels", relsXml);
    images.forEach(img => {
      zip.file(`word/media/img_${img.posIdx}.png`, img.data);
    });

    const blob = await zip.generateAsync({
      type: "blob",
      mimeType: DOCX_MIME,
      compression: "DEFLATE"
    });
    const file = new File([blob], dateiname, { type: DOCX_MIME });

    if (isIOS && navigator.share && navigator.canShare && navigator.canShare({ files:[file] })) {
      try { await navigator.share({ files:[file], title:dateiname }); return; }
      catch(e) { if (e.name==="AbortError") return; }
    }
    // Download (Desktop + iOS Fallback)
    const url = URL.createObjectURL(file);
    const a = document.createElement("a");
    a.href = url; a.download = dateiname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 15000);

  } catch(e) {
    alert("Word-Export fehlgeschlagen:\n" + e.message);
  }
}

async function holAdresse(lat, lng) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,
      { headers:{ "Accept-Language":"de" } }
    );
    const j = await r.json();
    const a = j.address || {};
    return [
      a.road ? a.road + (a.house_number ? " "+a.house_number : "") : null,
      a.postcode,
      a.city||a.town||a.village||a.municipality
    ].filter(Boolean).join(", ");
  } catch { return `${lat.toFixed(4)}, ${lng.toFixed(4)}`; }
}

// ─────────────────────────────────────────────────────────────
function SkizzenCanvas({value, onChange}) {
  const canvasRef = useRef(null);
  const drawing   = useRef(false);
  const lastPos   = useRef(null);
  const history   = useRef([]);
  const [farbe,    setFarbe]    = useState("#0f172a");
  const [staerke,  setStaerke]  = useState(3);
  const [radierer, setRadierer] = useState(false);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (value) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0);
      img.src = value;
    }
  }, []);

  const getPos = (e) => {
    const r  = canvasRef.current.getBoundingClientRect();
    const sx = canvasRef.current.width  / r.width;
    const sy = canvasRef.current.height / r.height;
    const src = e.touches ? e.touches[0] : e;
    return { x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy };
  };

  const startDraw = e => {
    e.preventDefault();
    history.current.push(canvasRef.current.toDataURL());
    if (history.current.length > 40) history.current.shift();
    drawing.current = true;
    lastPos.current = getPos(e);
  };

  const doDraw = e => {
    e.preventDefault();
    if (!drawing.current) return;
    const ctx = canvasRef.current.getContext("2d");
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = radierer ? "#fff" : farbe;
    ctx.lineWidth   = radierer ? 24 : staerke;
    ctx.lineCap = ctx.lineJoin = "round";
    ctx.stroke();
    lastPos.current = pos;
  };

  const endDraw = () => {
    if (!drawing.current) return;
    drawing.current = false;
    onChange(canvasRef.current.toDataURL());
  };

  const undo = () => {
    if (!history.current.length) return;
    const prev = history.current.pop();
    const img  = new Image();
    img.onload = () => {
      const ctx = canvasRef.current.getContext("2d");
      ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
      ctx.drawImage(img, 0, 0);
      onChange(canvasRef.current.toDataURL());
    };
    img.src = prev;
  };

  const loeschen = () => {
    history.current.push(canvasRef.current.toDataURL());
    const ctx = canvasRef.current.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvasRef.current.width, canvasRef.current.height);
    onChange("");
  };

  const FARBEN = ["#0f172a","#ef4444","#2563eb","#16a34a","#d97706","#7c3aed","#64748b"];

  return (
    <F label="Skizze / Zeichnung">
      <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:8, flexWrap:"wrap"}}>
        {FARBEN.map(f=>(
          <button key={f} onClick={()=>{setFarbe(f);setRadierer(false);}} style={{
            width:26, height:26, borderRadius:"50%", background:f, border:"none",
            cursor:"pointer", outline:(!radierer&&farbe===f)?"3px solid #2563eb":"2px solid transparent",
            outlineOffset:2
          }}/>
        ))}
        <button onClick={()=>setRadierer(r=>!r)} style={{
          width:32, height:32, borderRadius:8, border:"2px solid", cursor:"pointer", fontSize:16,
          background:radierer?"#fef9c3":"#fff", borderColor:radierer?"#d97706":"#e2e8f0"
        }}>🧹</button>
      </div>
      <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:8, flexWrap:"wrap"}}>
        {[2,4,7,12].map(s=>(
          <button key={s} onClick={()=>{setStaerke(s);setRadierer(false);}} style={{
            width:s+16, height:s+16, borderRadius:"50%", background:"#0f172a",
            border:"none", cursor:"pointer",
            outline:(!radierer&&staerke===s)?"2px solid #2563eb":"none", outlineOffset:2
          }}/>
        ))}
        <div style={{marginLeft:"auto", display:"flex", gap:6}}>
          <button onClick={undo} style={{padding:"6px 12px", borderRadius:8,
            border:"2px solid #e2e8f0", background:"#fff", fontSize:13,
            fontWeight:700, color:"#2563eb", cursor:"pointer"}}>↩ Rückgängig</button>
          <button onClick={loeschen} style={{padding:"6px 12px", borderRadius:8,
            border:"2px solid #fee2e2", background:"#fff", fontSize:13,
            fontWeight:700, color:"#ef4444", cursor:"pointer"}}>✕ Löschen</button>
        </div>
      </div>
      <canvas ref={canvasRef} width={700} height={400}
        onMouseDown={startDraw} onMouseMove={doDraw}
        onMouseUp={endDraw} onMouseLeave={endDraw}
        onTouchStart={startDraw} onTouchMove={doDraw} onTouchEnd={endDraw}
        style={{width:"100%", height:"auto", borderRadius:10, display:"block",
          touchAction:"none", background:"#fff",
          border:radierer?"2px solid #d97706":"2px solid #e2e8f0",
          cursor:radierer?"cell":"crosshair"}}/>
      <p style={{fontSize:11, color:"#94a3b8", marginTop:5}}>
        ✏️ Mit Finger, Apple Pencil oder Maus zeichnen · 🧹 Radiergummi · ↩ Rückgängig
      </p>
    </F>
  );
}

// ── Flächen-Skizze (Apple Pencil optimiert) ──────────────────
function FlaechenSkizze({ value, onChange }) {
  const canvasRef = React.useRef(null);
  const [malt, setMalt]     = React.useState(false);
  const [farbe, setFarbe]   = React.useState("#1e3a5f");
  const [staerke, setStaerke] = React.useState(2);
  const letzter = React.useRef(null);
  const hist    = React.useRef([]);

  // Canvas initialisieren
  React.useEffect(() => {
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext("2d");
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, c.width, c.height);
    if (value) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0);
      img.src = value;
    }
  }, []);

  const xy = (e, c) => {
    const r = c.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return [(t.clientX - r.left) * (c.width / r.width),
            (t.clientY - r.top)  * (c.height / r.height)];
  };

  const start = e => {
    e.preventDefault();
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext("2d");
    hist.current.push(ctx.getImageData(0, 0, c.width, c.height));
    if (hist.current.length > 30) hist.current.shift();
    setMalt(true);
    letzter.current = xy(e, c);
    // Punkt setzen
    const [x, y] = letzter.current;
    ctx.beginPath();
    ctx.arc(x, y, staerke/2, 0, Math.PI*2);
    ctx.fillStyle = farbe;
    ctx.fill();
  };

  const move = e => {
    e.preventDefault();
    if (!malt) return;
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext("2d");
    const [x, y] = xy(e, c);
    const [px, py] = letzter.current;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(x, y);
    ctx.strokeStyle = farbe;
    ctx.lineWidth = staerke;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.stroke();
    letzter.current = [x, y];
  };

  const end = e => {
    e.preventDefault();
    setMalt(false);
    if (canvasRef.current)
      onChange(canvasRef.current.toDataURL("image/png"));
  };

  const undo = () => {
    if (!hist.current.length) return;
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext("2d");
    ctx.putImageData(hist.current.pop(), 0, 0);
    onChange(c.toDataURL("image/png"));
  };

  const clear = () => {
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext("2d");
    hist.current.push(ctx.getImageData(0, 0, c.width, c.height));
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, c.width, c.height);
    onChange(c.toDataURL("image/png"));
  };

  const FARBEN  = ["#1e3a5f","#ef4444","#16a34a","#f59e0b","#7c3aed","#000000"];
  const STAERKEN = [{v:1,l:"S"},{v:2,l:"M"},{v:4,l:"L"},{v:8,l:"XL"}];

  return (
    <div style={{borderRadius:10, overflow:"hidden", border:"1px solid #e2e8f0"}}>
      {/* Toolbar */}
      <div style={{background:"#f1f5f9", padding:"6px 8px", display:"flex",
        alignItems:"center", gap:6, flexWrap:"wrap"}}>
        {/* Farben */}
        {FARBEN.map(f=>(
          <button key={f} onClick={()=>setFarbe(f)}
            style={{width:22, height:22, borderRadius:"50%", background:f, border:"none",
              cursor:"pointer", outline: farbe===f ? "3px solid #2563eb" : "none",
              outlineOffset:2, flexShrink:0}}/>
        ))}
        {/* Radierer */}
        <button onClick={()=>setFarbe("#ffffff")}
          style={{background: farbe==="#ffffff" ? "#2563eb" : "#e2e8f0",
            color: farbe==="#ffffff" ? "#fff" : "#64748b",
            border:"none", borderRadius:7, padding:"3px 8px",
            fontSize:12, fontWeight:700, cursor:"pointer"}}>⌫</button>
        <div style={{width:1, background:"#cbd5e1", alignSelf:"stretch", margin:"0 2px"}}/>
        {/* Stärke */}
        {STAERKEN.map(({v,l})=>(
          <button key={v} onClick={()=>setStaerke(v)}
            style={{background: staerke===v ? "#1e3a5f" : "#e2e8f0",
              color: staerke===v ? "#fff" : "#64748b",
              border:"none", borderRadius:6, padding:"3px 7px",
              fontSize:11, fontWeight:700, cursor:"pointer"}}>
            {l}
          </button>
        ))}
        <div style={{flex:1}}/>
        <button onClick={undo}
          style={{background:"#fff", border:"1px solid #e2e8f0", borderRadius:7,
            padding:"3px 8px", fontSize:12, cursor:"pointer", color:"#64748b", fontWeight:700}}>↩</button>
        <button onClick={clear}
          style={{background:"#fef2f2", border:"1px solid #fecaca", borderRadius:7,
            padding:"3px 8px", fontSize:12, cursor:"pointer", color:"#ef4444", fontWeight:700}}>✕</button>
      </div>
      {/* Canvas */}
      <canvas ref={canvasRef} width={600} height={300}
        style={{width:"100%", height:"auto", display:"block",
          touchAction:"none", cursor:"crosshair",
          background:"#fff"}}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
      <div style={{background:"#f8fafc", padding:"4px 8px",
        fontSize:10, color:"#94a3b8", textAlign:"center"}}>
        Apple Pencil / Finger / Maus
      </div>
    </div>
  );
}

function SchadenCard({s, idx, onChange, onRemove, alleTops}) {
  const istPos1 = idx === 0;
  const extra   = Array.isArray(s.extraFelder) ? s.extraFelder : [];

  // alleTops = [{top, geschoss, personen}, ...]
  const topMap = {}; // top-Name → {geschoss, personen}
  alleTops.forEach(e => {
    if (e.top && e.top.trim()) topMap[e.top.trim()] = e;
  });
  const vorhandTops = Object.keys(topMap);

  const togArr = (feld, val) => {
    const c = Array.isArray(s[feld]) ? s[feld] : [];
    onChange(feld, c.includes(val) ? c.filter(x=>x!==val) : [...c, val]);
  };

  // Materialien-Toggle mit automatischer Flächen-Synchronisierung
  const togMaterial = (mat) => {
    const cur = Array.isArray(s.materialien) ? s.materialien : [];
    const curFlaechen = Array.isArray(s.flaechen) ? s.flaechen : [];
    if (cur.includes(mat)) {
      // Abwählen: Fläche nur entfernen wenn m² noch leer
      const neuFlaechen = curFlaechen.filter(f => !(f.typ === mat && !f.m2));
      onChange("materialien", cur.filter(x=>x!==mat));
      onChange("flaechen", neuFlaechen);
    } else {
      // Auswählen: Flächen-Eintrag hinzufügen (falls noch nicht vorhanden)
      const bereitsVorhanden = curFlaechen.some(f => f.typ === mat);
      const neuFlaechen = bereitsVorhanden ? curFlaechen
        : [...curFlaechen, {typ:mat, m2:"", raumL:"", raumB:"", hoehe:"", hoeheFreitext:"", alter:"", skizzeOffen:false, skizze:""}];
      onChange("materialien", [...cur, mat]);
      onChange("flaechen", neuFlaechen);
    }
  };
  const toggleExtra = (feld) => {
    const neu = extra.includes(feld) ? extra.filter(x=>x!==feld) : [...extra, feld];
    onChange("extraFelder", neu);
  };

  const hatUrsache      = istPos1 || extra.includes("Ursacheneruierung");
  const hatBeschreibung = istPos1 || extra.includes("Schadensbeschreibung");
  const verfuegbareOpt  = OPT_FELDER.filter(f => !extra.includes(f));

  // Beim Auswählen eines bekannten TOP: top + geschoss + Personen übernehmen
  const waehleTop = (topName) => {
    if (!topName) return;
    const entry = topMap[topName] || {};
    onChange("top", topName);
    onChange("geschoss", entry.geschoss||"");
    // Personen übernehmen wenn aktuell leer und TOP bereits Personen hat
    if (!(s.personen||[]).length && (entry.personen||[]).length) {
      onChange("personen", entry.personen);
    } else if (!(s.personen||[]).length && topName) {
      // Auto-fill: TOP-Name als erste Person vorschlagen
      onChange("personen", [{ name: topName, status:"", statusFreitext:"" }]);
    }
  };

  const headerLabel = [s.top, s.geschoss].filter(Boolean).join(" · ");

  return (
    <div style={{background:"#fff", borderRadius:14, border:"2px solid #e2e8f0",
      padding:16, marginBottom:16, boxShadow:"0 2px 10px #0000000a"}}>

      {/* Header */}
      <div style={{display:"flex", justifyContent:"space-between",
        alignItems:"center", marginBottom:14}}>
        <div style={{display:"flex", alignItems:"center", gap:10, flex:1, minWidth:0}}>
          <span style={{fontWeight:800, fontSize:15, color:"#0f172a", flexShrink:0}}>
            🔍 Position {idx+1}
          </span>
          {headerLabel && (
            <span style={{background:"#f0f9ff", color:"#0284c7",
              border:"1px solid #bae6fd", borderRadius:20,
              padding:"2px 10px", fontSize:12, fontWeight:700,
              maxWidth:200, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
              {headerLabel}
            </span>
          )}
        </div>
        <button onClick={onRemove} style={{background:"#fef2f2", border:"none",
          color:"#ef4444", borderRadius:8, padding:"5px 12px",
          cursor:"pointer", fontWeight:700, flexShrink:0}}>Entfernen</button>
      </div>

      {/* Positionstyp – Ursachenbehebung / Folgeschaden */}
      <div style={{display:"flex", gap:8, marginBottom:14}}>
        {[
          {v:"Ursachenbehebung", icon:"🔧", color:"#2563eb", bg:"#eff6ff", border:"#bfdbfe"},
          {v:"Folgeschaden",     icon:"💧", color:"#dc2626", bg:"#fef2f2", border:"#fecaca"},
        ].map(({v,icon,color,bg,border})=>(
          <button key={v} onClick={()=>onChange("positionstyp", s.positionstyp===v ? "" : v)}
            style={{
              flex:1, padding:"10px 8px", borderRadius:10, cursor:"pointer",
              border:"2px solid " + (s.positionstyp===v ? color : "#e2e8f0"),
              background: s.positionstyp===v ? bg : "#f8fafc",
              color: s.positionstyp===v ? color : "#94a3b8",
              fontWeight:800, fontSize:13, transition:"all 0.15s",
              display:"flex", alignItems:"center", justifyContent:"center", gap:6,
            }}>
            <span>{icon}</span>
            <span>{v}</span>
            {s.positionstyp===v && <span style={{fontSize:16}}>✓</span>}
          </button>
        ))}
      </div>

      {/* Schadenbeschreibung – nur bei Folgeschaden */}
      {s.positionstyp === "Folgeschaden" && (
        <div style={{marginBottom:14}}>
          <label style={{...LBL, color:"#dc2626"}}>Schadenbeschreibung</label>
          <textarea
            value={s.folgeschaden_beschreibung||""}
            onChange={e=>onChange("folgeschaden_beschreibung", e.target.value)}
            placeholder="Beschreibung des Folgeschadens…"
            rows={3}
            style={{width:"100%", padding:"10px 12px", border:"2px solid #fecaca",
              borderRadius:9, fontSize:13, fontFamily:"inherit", outline:"none",
              resize:"vertical", boxSizing:"border-box", background:"#fff9f9",
              color:"#1e293b", lineHeight:1.6}}/>
        </div>
      )}

      {/* TOP + Geschoss nebeneinander */}
      <div style={{display:"flex", gap:10, marginBottom:14}}>
        {/* TOP */}
        <div style={{flex:2}}>
          <label style={LBL}>TOP / Wohnung</label>

          {/* Zeile 1: Dropdown bekannte TOPs (nur wenn vorhanden) */}
          {vorhandTops.length > 0 && (
            <select value=""
              onChange={e=>{ if(e.target.value) waehleTop(e.target.value); }}
              style={{...SS, width:"100%", color:"#94a3b8", marginBottom:6}}>
              <option value="">↩ Bekannten TOP übernehmen…</option>
              {vorhandTops.map(t=>(
                <option key={t} value={t}>
                  {t}{topMap[t]?.geschoss ? `  –  ${topMap[t].geschoss}` : ""}{(topMap[t]?.personen||[]).length ? `  ·  ${topMap[t].personen[0].name}` : ""}
                </option>
              ))}
            </select>
          )}

          {/* Zeile 2: Freitext – immer sichtbar */}
          <input type="text" value={s.top||""}
            placeholder="TOP 5, Dachgeschoss links, Büro 2…"
            onChange={e=>onChange("top", e.target.value)}
            onBlur={e=>{
              const val = e.target.value.trim();
              if (!val) return;
              if (!(s.personen||[]).length) {
                onChange("personen", [{ name: val, status:"", statusFreitext:"" }]);
              } else if ((s.personen||[]).length === 1 && !s.personen[0].name) {
                onChange("personen", [{ ...s.personen[0], name: val }]);
              }
            }}
            style={{...SI, width:"100%"}}/>

          {vorhandTops.length > 0 && (
            <p style={{fontSize:11, color:"#94a3b8", marginTop:4}}>
              ↩ Auswahl oben übernimmt TOP + Geschoss · oder beliebigen Namen eingeben
            </p>
          )}
        </div>

        {/* Geschoss */}
        <div style={{flex:1}}>
          <label style={LBL}>Geschoss</label>
          <select value={s.geschoss||""}
            onChange={e=>onChange("geschoss", e.target.value)}
            style={{...SS, color:(s.geschoss)?"#0f172a":"#94a3b8"}}>
            <option value="">– Auswählen</option>
            {GESCHOSSE.map(g=><option key={g} value={g}>{g}</option>)}
          </select>
        </div>
      </div>

      {/* Anwesende Personen – mehrere möglich */}
      <div style={{background:"#fafafa", border:"1px solid #e2e8f0",
        borderRadius:11, padding:12, marginBottom:14}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
          <div style={{fontSize:11, fontWeight:700, color:"#64748b",
            textTransform:"uppercase", letterSpacing:1}}>
            👥 Anwesende Personen
          </div>
          <button onClick={()=>onChange("personen",[...(s.personen||[]),{name:"",status:"",statusFreitext:""}])}
            style={{background:"#eff6ff", border:"1px solid #bfdbfe", color:"#2563eb",
              borderRadius:8, padding:"4px 12px", fontSize:12, fontWeight:700, cursor:"pointer"}}>
            + Person
          </button>
        </div>

        {(s.personen||[]).length === 0 && (
          <p style={{fontSize:12, color:"#94a3b8", margin:"4px 0 8px"}}>
            Wird automatisch aus TOP / Wohnung befüllt – oder manuell hinzufügen.
          </p>
        )}

        {(s.personen||[]).map((p, pi) => (
          <div key={pi} style={{background:"#fff", border:"1px solid #e2e8f0",
            borderRadius:9, padding:10, marginBottom:8}}>
            <div style={{display:"flex", gap:8, flexWrap:"wrap", alignItems:"flex-start"}}>
              {/* Name */}
              <div style={{flex:"2 1 140px"}}>
                {pi===0 && <label style={LBL}>Name</label>}
                <input type="text" value={p.name||""}
                  placeholder="Vor- und Nachname…"
                  onChange={e=>{
                    const neu=[...(s.personen||[])];
                    neu[pi]={...neu[pi],name:e.target.value};
                    onChange("personen",neu);
                  }}
                  style={SI}/>
              </div>
              {/* Status */}
              <div style={{flex:"1 1 110px"}}>
                {pi===0 && <label style={LBL}>Status</label>}
                <select value={p.status||""}
                  onChange={e=>{
                    const neu=[...(s.personen||[])];
                    neu[pi]={...neu[pi],status:e.target.value};
                    onChange("personen",neu);
                  }}
                  style={{...SS, color:p.status?"#0f172a":"#94a3b8"}}>
                  <option value="">– Auswählen</option>
                  {STATUS_OPTS.map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              </div>
              {/* Entfernen */}
              <button onClick={()=>onChange("personen",(s.personen||[]).filter((_,j)=>j!==pi))}
                style={{background:"none", border:"none", color:"#ef4444",
                  fontSize:20, cursor:"pointer", padding:"0 4px",
                  alignSelf:"flex-end", marginBottom:2, flexShrink:0}}>×</button>
            </div>
            {/* Freitext bei Sonstige */}
            {p.status === "Sonstige" && (
              <input type="text" value={p.statusFreitext||""}
                placeholder="z.B. Nachbar, Hausbesorger…"
                onChange={e=>{
                  const neu=[...(s.personen||[])];
                  neu[pi]={...neu[pi],statusFreitext:e.target.value};
                  onChange("personen",neu);
                }}
                style={{...SI, marginTop:6}}/>
            )}
          </div>
        ))}

        {/* Personen von gleichem TOP übernehmen */}
        {s.top && topMap[s.top] && (topMap[s.top].personen||[]).length > 0 && !(s.personen||[]).length && (
          <button onClick={()=>onChange("personen", topMap[s.top].personen)}
            style={{width:"100%", padding:"7px 14px", borderRadius:9,
              border:"1px solid #bae6fd", background:"#eff6ff",
              color:"#0284c7", fontWeight:700, fontSize:12, cursor:"pointer"}}>
            ↩ Personen von {s.top} übernehmen
          </button>
        )}
      </div>

      {/* Räume */}
      <MultiSel label="Betroffene Räume" opts={RAEUME}
        selected={s.raeume||[]} onToggle={v=>togArr("raeume",v)} color="#2563eb"/>

      {/* Materialien */}
      <MultiSel label="Materialien / Bauteile" opts={MATERIALIEN}
        selected={s.materialien||[]} onToggle={togMaterial} color="#7c3aed"/>

      {/* Flächen */}
      <div style={{marginBottom:14}}>
        <label style={{...LBL, display:"block", marginBottom:6}}>Zu sanierende Flächen (m²)</label>

        {(s.flaechen||[]).map((fl,fi)=>(
          <div key={fi} style={{background:"#f8fafc", border:"1px solid #e2e8f0",
            borderRadius:11, padding:12, marginBottom:10}}>

            {/* Zeile 1: Element + m² + Löschen */}
            <div style={{display:"flex", gap:8, marginBottom:8, alignItems:"center"}}>
              <select value={fl.typ||""} onChange={e=>{
                const neu=[...(s.flaechen||[])]; neu[fi]={...neu[fi],typ:e.target.value};
                onChange("flaechen",neu);
              }} style={{...SS, flex:2, color:fl.typ?"#0f172a":"#94a3b8"}}>
                <option value="">Element wählen…</option>
                {MATERIALIEN.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
              <div style={{display:"flex", alignItems:"center", gap:4, flex:1}}>
                <input type="number" min="0" step="0.1" value={fl.m2||""} placeholder="0"
                  onChange={e=>{
                    const neu=[...(s.flaechen||[])]; neu[fi]={...neu[fi],m2:e.target.value};
                    onChange("flaechen",neu);
                  }} style={{...SI, textAlign:"right"}}/>
                <span style={{color:"#64748b", fontWeight:700, fontSize:14, flexShrink:0}}>m²</span>
              </div>
              <button onClick={()=>onChange("flaechen",(s.flaechen||[]).filter((_,j)=>j!==fi))}
                style={{background:"none",border:"none",color:"#ef4444",fontSize:20,cursor:"pointer",flexShrink:0}}>×</button>
            </div>

            {/* Alter des Materials */}
            <div style={{marginBottom:8}}>
              <select value={fl.alter||""} onChange={e=>{
                const neu=[...(s.flaechen||[])]; neu[fi]={...neu[fi],alter:e.target.value};
                onChange("flaechen",neu);
              }} style={{...SS, width:"100%", color:fl.alter?"#0f172a":"#94a3b8"}}>
                <option value="">Alter {fl.typ||"Material"} – nicht angegeben</option>
                <option value="unbekannt">Unbekannt</option>
                {Array.from({length:60},(_,i)=>i+1).map(n=>(
                  <option key={n} value={`${n} Jahr${n===1?"":"e"}`}>{n} Jahr{n===1?"":"e"}</option>
                ))}
              </select>
            </div>

            {/* Zeile 2: Raumabmessungen L × B */}
            <div style={{display:"flex", gap:6, marginBottom:8, alignItems:"center"}}>
              <span style={{fontSize:11, color:"#64748b", fontWeight:700, flexShrink:0, minWidth:28}}>L</span>
              <input type="number" min="0" step="0.01" value={fl.raumL||""} placeholder="0,00"
                onChange={e=>{
                  const neu=[...(s.flaechen||[])]; neu[fi]={...neu[fi],raumL:e.target.value};
                  onChange("flaechen",neu);
                }} style={{...SI, flex:1, textAlign:"right"}}/>
              <span style={{color:"#94a3b8", fontSize:13, flexShrink:0}}>m ×</span>
              <span style={{fontSize:11, color:"#64748b", fontWeight:700, flexShrink:0, minWidth:18}}>B</span>
              <input type="number" min="0" step="0.01" value={fl.raumB||""} placeholder="0,00"
                onChange={e=>{
                  const neu=[...(s.flaechen||[])]; neu[fi]={...neu[fi],raumB:e.target.value};
                  onChange("flaechen",neu);
                }} style={{...SI, flex:1, textAlign:"right"}}/>
              <span style={{color:"#94a3b8", fontSize:13, flexShrink:0}}>m</span>
              {/* Auto-berechne m² */}
              {fl.raumL && fl.raumB && (
                <button onClick={()=>{
                  const m2 = (parseFloat(fl.raumL)*parseFloat(fl.raumB)).toFixed(2);
                  const neu=[...(s.flaechen||[])]; neu[fi]={...neu[fi],m2};
                  onChange("flaechen",neu);
                }} style={{background:"#eff6ff", border:"1px solid #bfdbfe", color:"#2563eb",
                  borderRadius:7, padding:"4px 8px", fontSize:11, fontWeight:700, cursor:"pointer", flexShrink:0}}>
                  = {(parseFloat(fl.raumL)*parseFloat(fl.raumB)).toFixed(2)} m²
                </button>
              )}
            </div>

            {/* Zeile 3: Raumhöhe */}
            <div style={{display:"flex", gap:6, alignItems:"center", marginBottom: fl.skizzeOffen ? 8 : 0}}>
              <span style={{fontSize:11, color:"#64748b", fontWeight:700, flexShrink:0, minWidth:60}}>Raumhöhe</span>
              <select value={fl.hoehe||""} onChange={e=>{
                const neu=[...(s.flaechen||[])]; neu[fi]={...neu[fi],hoehe:e.target.value, hoeheFreitext:""};
                onChange("flaechen",neu);
              }} style={{...SS, flex:1, color:fl.hoehe?"#0f172a":"#94a3b8"}}>
                <option value="">– wählen</option>
                {["2,30 m","2,40 m","2,50 m","2,60 m","2,70 m","2,80 m","2,90 m","3,00 m",
                  "3,20 m","3,50 m","4,00 m"].map(h=><option key={h} value={h}>{h}</option>)}
                <option value="__custom__">Andere Höhe…</option>
              </select>
              {fl.hoehe === "__custom__" && (
                <div style={{display:"flex", alignItems:"center", gap:4, flex:1}}>
                  <input type="number" min="0" step="0.05" value={fl.hoeheFreitext||""}
                    placeholder="z.B. 3,40"
                    onChange={e=>{
                      const neu=[...(s.flaechen||[])]; neu[fi]={...neu[fi],hoeheFreitext:e.target.value};
                      onChange("flaechen",neu);
                    }} style={{...SI, flex:1, textAlign:"right"}}/>
                  <span style={{color:"#64748b", fontSize:13, flexShrink:0}}>m</span>
                </div>
              )}
              {/* Skizze Toggle */}
              <button onClick={()=>{
                const neu=[...(s.flaechen||[])]; neu[fi]={...neu[fi],skizzeOffen:!fl.skizzeOffen};
                onChange("flaechen",neu);
              }} style={{background: fl.skizzeOffen ? "#1e3a5f" : "#f1f5f9",
                border:"1px solid"+(fl.skizzeOffen?" #1e3a5f":" #cbd5e1"),
                color: fl.skizzeOffen ? "#fff" : "#64748b",
                borderRadius:8, padding:"5px 10px", fontSize:11, fontWeight:700,
                cursor:"pointer", flexShrink:0}}>
                ✏️ Skizze
              </button>
            </div>

            {/* Skizze für diese Fläche (Apple Pencil optimiert) */}
            {fl.skizzeOffen && (
              <div style={{marginTop:8}}>
                <FlaechenSkizze
                  value={fl.skizze||""}
                  onChange={v=>{
                    const neu=[...(s.flaechen||[])]; neu[fi]={...neu[fi],skizze:v};
                    onChange("flaechen",neu);
                  }}/>
              </div>
            )}
          </div>
        ))}

        <button onClick={()=>onChange("flaechen",[...(s.flaechen||[]),
          {typ:"",m2:"",raumL:"",raumB:"",hoehe:"",hoeheFreitext:"",alter:"",skizzeOffen:false,skizze:""}])}
          style={{width:"100%", padding:10, borderRadius:10,
            border:"2px dashed #cbd5e1", background:"#f8fafc",
            color:"#64748b", fontWeight:700, fontSize:13, cursor:"pointer"}}>
          + Fläche manuell hinzufügen
        </button>
      </div>

      {/* Angaben vor Ort + Ursacheneruierung – immer Pos1, sonst optional */}
      {hatUrsache && (
        <TxtInput label="Angaben vor Ort" value={s.angabenVorOrt}
          onChange={v=>onChange("angabenVorOrt",v)} placeholder="Angaben der anwesenden Person vor Ort…" multi/>
      )}
      {hatUrsache && (
        <TxtInput label="Ursacheneruierung" value={s.ursache}
          onChange={v=>onChange("ursache",v)} placeholder="Ursache des Schadens…" multi/>
      )}

      {/* Schadensbeschreibung – immer Pos1, sonst optional */}
      {hatBeschreibung && (
        <TxtInput label="Schadensbeschreibung" value={s.beschreibung}
          onChange={v=>onChange("beschreibung",v)} placeholder="Detaillierte Beschreibung…" multi/>
      )}

      {/* Skizze – nur bei Bedarf */}
      <div style={{marginBottom:14}}>
        <button onClick={()=>onChange("skizzeOffen", !s.skizzeOffen)}
          style={{
            width:"100%", padding:"10px 14px", borderRadius:10, cursor:"pointer",
            border:"2px solid " + (s.skizzeOffen ? "#1e3a5f" : "#e2e8f0"),
            background: s.skizzeOffen ? "#1e3a5f" : "#f8fafc",
            color: s.skizzeOffen ? "#fff" : "#64748b",
            fontWeight:700, fontSize:13, textAlign:"left",
            display:"flex", alignItems:"center", gap:8,
          }}>
          <span>✏️</span>
          <span>{s.skizzeOffen ? "Skizze schließen" : "Skizze hinzufügen"}</span>
          <span style={{marginLeft:"auto", fontSize:16}}>{s.skizzeOffen ? "▲" : "▼"}</span>
        </button>
        {s.skizzeOffen && (
          <div style={{marginTop:8}}>
            <SkizzenCanvas value={s.skizze} onChange={v=>onChange("skizze",v)}/>
          </div>
        )}
      </div>

      {/* Technische Trocknung */}
      <div style={{background:"#f0f9ff", border:"1px solid #bae6fd",
        borderRadius:11, padding:12, marginBottom:14}}>
        <div style={{fontSize:11, fontWeight:700, color:"#0284c7",
          textTransform:"uppercase", letterSpacing:1, marginBottom:10}}>
          💨 Technische Trocknung
        </div>

        {/* 3 Zustände */}
        <div style={{display:"flex", flexDirection:"column", gap:6}}>
          {[
            {v:"Ja",          label:"Vorhanden und in Betrieb"},
            {v:"Empfohlen",   label:"Technisch erforderlich, noch nicht ausgeführt"},
            {v:"Nein",        label:"Nicht erforderlich"},
          ].map(({v,label})=>(
            <button key={v} onClick={()=>onChange("trocknung_vorhanden", s.trocknung_vorhanden===v ? "" : v)}
              style={{textAlign:"left", padding:"9px 14px", borderRadius:9,
                fontSize:13, fontWeight:700, cursor:"pointer", border:"2px solid",
                borderColor: s.trocknung_vorhanden===v
                  ? (v==="Empfohlen" ? "#f59e0b" : v==="Ja" ? "#0284c7" : "#94a3b8")
                  : "#e2e8f0",
                background: s.trocknung_vorhanden===v
                  ? (v==="Empfohlen" ? "#fffbeb" : v==="Ja" ? "#eff6ff" : "#f8fafc")
                  : "#fff",
                color: s.trocknung_vorhanden===v
                  ? (v==="Empfohlen" ? "#b45309" : v==="Ja" ? "#0284c7" : "#64748b")
                  : "#64748b"}}>
              {v==="Ja" ? "✓ " : v==="Empfohlen" ? "⚠ " : "– "}{label}
            </button>
          ))}
        </div>

        {/* Art der Trocknung – bei Vorhanden ODER Empfohlen */}
        {(s.trocknung_vorhanden==="Ja" || s.trocknung_vorhanden==="Empfohlen") && (
          <div style={{marginTop:10}}>
            <label style={LBL}>Art der Trocknung</label>
            <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
              {["Dämmschichttrocknung","Raumlufttrocknung"].map(art=>(
                <button key={art} onClick={()=>{
                  const cur = s.trocknung_art||[];
                  onChange("trocknung_art", cur.includes(art) ? cur.filter(x=>x!==art) : [...cur,art]);
                }} style={{
                  padding:"8px 14px", borderRadius:9, fontSize:13, fontWeight:700,
                  cursor:"pointer", border:"2px solid",
                  borderColor: (s.trocknung_art||[]).includes(art)
                    ? (s.trocknung_vorhanden==="Empfohlen" ? "#f59e0b" : "#0284c7") : "#e2e8f0",
                  background: (s.trocknung_art||[]).includes(art)
                    ? (s.trocknung_vorhanden==="Empfohlen" ? "#fffbeb" : "#eff6ff") : "#fff",
                  color: (s.trocknung_art||[]).includes(art)
                    ? (s.trocknung_vorhanden==="Empfohlen" ? "#b45309" : "#0284c7") : "#64748b"
                }}>
                  {art}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Feuchtigkeitswerte – bei Vorhanden ODER Empfohlen */}
        {(s.trocknung_vorhanden==="Ja" || s.trocknung_vorhanden==="Empfohlen") && (
          <div style={{marginTop:10}}>
            <label style={LBL}>Feuchtigkeitsmessung</label>
            <div style={{display:"flex", flexDirection:"column", gap:6}}>
              {[
                {v:"erhöht",    label:"Erhöhte Feuchtigkeitswerte gemessen",       color:"#dc2626", bg:"#fef2f2", border:"#fecaca"},
                {v:"nicht_erhoeht", label:"Keine erhöhten Feuchtigkeitswerte gemessen", color:"#16a34a", bg:"#f0fdf4", border:"#bbf7d0"},
              ].map(({v,label,color,bg,border})=>(
                <button key={v} onClick={()=>onChange("feuchtigkeitswerte", s.feuchtigkeitswerte===v ? "" : v)}
                  style={{textAlign:"left", padding:"9px 14px", borderRadius:9,
                    fontSize:13, fontWeight:700, cursor:"pointer", border:"2px solid",
                    borderColor: s.feuchtigkeitswerte===v ? color : "#e2e8f0",
                    background:  s.feuchtigkeitswerte===v ? bg : "#fff",
                    color:       s.feuchtigkeitswerte===v ? color : "#64748b"}}>
                  {s.feuchtigkeitswerte===v ? "✓ " : "○ "}{label}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* ── Sanierung / Ursachenbehebung – konditionell ── */}
      {(s.positionstyp==="Ursachenbehebung" || s.positionstyp==="Folgeschaden") && (
        <div style={{background: s.positionstyp==="Ursachenbehebung" ? "#f0fdf4" : "#fef2f2",
          border:"1px solid " + (s.positionstyp==="Ursachenbehebung" ? "#bbf7d0" : "#fecaca"),
          borderRadius:11, padding:12, marginBottom:14}}>
          <div style={{fontSize:11, fontWeight:700,
            color: s.positionstyp==="Ursachenbehebung" ? "#15803d" : "#dc2626",
            textTransform:"uppercase", letterSpacing:1, marginBottom:10}}>
            {s.positionstyp==="Ursachenbehebung" ? "🔧 Sanierung & Ursachenbehebung" : "🔨 Sanierung Folgeschaden"}
          </div>

          {/* Leckortung – nur bei Ursachenbehebung */}
          {s.positionstyp==="Ursachenbehebung" && (
            <div style={{marginBottom:12}}>
              <label style={LBL}>Leckortung</label>
              <div style={{display:"flex", gap:8}}>
                {["Ja","Nein"].map(v=>(
                  <button key={v} onClick={()=>onChange("leckortung", s.leckortung===v ? "" : v)}
                    style={{flex:1, padding:"9px 8px", borderRadius:9, cursor:"pointer", fontWeight:700, fontSize:13,
                      border:"2px solid " + (s.leckortung===v ? (v==="Ja"?"#16a34a":"#dc2626") : "#e2e8f0"),
                      background: s.leckortung===v ? (v==="Ja"?"#f0fdf4":"#fef2f2") : "#fff",
                      color: s.leckortung===v ? (v==="Ja"?"#16a34a":"#dc2626") : "#64748b"}}>
                    {s.leckortung===v ? "✓ " : ""}{v==="Ja" ? "🔍 Vorhanden" : "✕ Nicht vorhanden"}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Sanierung partiell – bei beiden */}
          <div style={{marginBottom:12}}>
            <label style={LBL}>Sanierung partiell</label>
            <div style={{display:"flex", gap:8}}>
              {["Ja","Nein"].map(v=>(
                <button key={v} onClick={()=>onChange("sanierung_partiell", s.sanierung_partiell===v ? "" : v)}
                  style={{flex:1, padding:"9px 8px", borderRadius:9, cursor:"pointer", fontWeight:700, fontSize:13,
                    border:"2px solid " + (s.sanierung_partiell===v ? "#2563eb" : "#e2e8f0"),
                    background: s.sanierung_partiell===v ? "#eff6ff" : "#fff",
                    color: s.sanierung_partiell===v ? "#2563eb" : "#64748b"}}>
                  {s.sanierung_partiell===v ? "✓ " : ""}{v}
                </button>
              ))}
            </div>
          </div>

          {/* Tauschausmaß – nur wenn Ja */}
          {s.sanierung_partiell==="Ja" && (
            <div style={{marginBottom:12}}>
              <label style={LBL}>Tauschausmaß (lm oder m²)</label>
              <input type="text" value={s.sanierung_ausmass||""} onChange={e=>onChange("sanierung_ausmass",e.target.value)}
                placeholder="z.B. 3,5 lm oder 12 m²…"
                style={{...SI, width:"100%"}}/>
            </div>
          )}

          {/* Firmen – duplizierbar, bei beiden */}
          <div>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
              <label style={LBL}>Ausführende Firma(en)</label>
              <button onClick={()=>onChange("firmen",[...(s.firmen||[]),{name:"",handwerk:""}])}
                style={{background:"#eff6ff", border:"1px solid #bfdbfe", color:"#2563eb",
                  borderRadius:8, padding:"4px 12px", fontSize:12, fontWeight:700, cursor:"pointer"}}>
                + Firma
              </button>
            </div>
            {(s.firmen||[]).length===0 && (
              <button onClick={()=>onChange("firmen",[{name:"",handwerk:""}])}
                style={{width:"100%", padding:"9px", border:"2px dashed #d1fae5",
                  background:"#f0fdf4", borderRadius:9, color:"#16a34a",
                  fontWeight:700, fontSize:13, cursor:"pointer"}}>
                + Erste Firma hinzufügen
              </button>
            )}
            {(s.firmen||[]).map((f,fi)=>(
              <div key={fi} style={{background:"#fff", border:"1px solid #e2e8f0",
                borderRadius:9, padding:10, marginBottom:8}}>
                <div style={{display:"flex", gap:8, alignItems:"flex-start"}}>
                  <div style={{flex:1}}>
                    <input type="text" value={f.name||""} placeholder="Firmenname…"
                      onChange={e=>{
                        const neu=[...(s.firmen||[])]; neu[fi]={...neu[fi],name:e.target.value};
                        onChange("firmen",neu);
                      }} style={{...SI, width:"100%", marginBottom:6}}/>
                    <select value={f.handwerk||""}
                      onChange={e=>{
                        const neu=[...(s.firmen||[])]; neu[fi]={...neu[fi],handwerk:e.target.value};
                        onChange("firmen",neu);
                      }} style={{...SS, width:"100%", color:f.handwerk?"#0f172a":"#94a3b8"}}>
                      <option value="">– Handwerksbetrieb wählen</option>
                      {HANDWERKSBETRIEBE.map(h=><option key={h} value={h}>{h}</option>)}
                    </select>
                  </div>
                  <button onClick={()=>onChange("firmen",(s.firmen||[]).filter((_,j)=>j!==fi))}
                    style={{background:"none", border:"none", color:"#ef4444",
                      fontSize:20, cursor:"pointer", padding:"0 4px", flexShrink:0}}>×</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      {!istPos1 && (
        <div style={{background:"#f8fafc", border:"2px solid #e2e8f0",
          borderRadius:12, padding:14, marginBottom:14}}>
          <div style={{fontSize:11, fontWeight:700, color:"#64748b",
            textTransform:"uppercase", letterSpacing:1, marginBottom:10}}>
            Optionale Felder
          </div>

          {/* Dropdown zum Hinzufügen */}
          <select value="" onChange={e=>{
            const val = e.target.value;
            if (!val) return;
            if (val === "__freitext__") {
              // Neues Freitext-Feld hinzufügen
              const neu = [...(s.freitextFelder||[]),
                { id: Date.now(), label:"", text:"" }];
              onChange("freitextFelder", neu);
            } else {
              toggleExtra(val);
            }
          }} style={{...SS, color:"#94a3b8", marginBottom: (extra.length > 0 || (s.freitextFelder||[]).length > 0) ? 12 : 0}}>
            <option value="">+ Feld hinzufügen…</option>
            {verfuegbareOpt.map(f=>(
              <option key={f} value={f}>{f}</option>
            ))}
            <option value="__freitext__">✏️ Freitext-Feld</option>
          </select>

          {/* Aktive Standard-Felder als Tags */}
          {extra.length > 0 && (
            <div style={{display:"flex", flexWrap:"wrap", gap:6, marginBottom:10}}>
              {extra.map(f=>(
                <span key={f} style={{display:"inline-flex", alignItems:"center", gap:5,
                  background:"#eff6ff", color:"#2563eb", border:"1px solid #bfdbfe",
                  borderRadius:20, padding:"3px 10px", fontSize:13, fontWeight:600}}>
                  {f}
                  <button onClick={()=>toggleExtra(f)}
                    style={{background:"none", border:"none", color:"#2563eb",
                      fontSize:15, cursor:"pointer", padding:0, lineHeight:1}}>×</button>
                </span>
              ))}
            </div>
          )}

          {/* Freitext-Felder */}
          {(s.freitextFelder||[]).map((ft, fi)=>(
            <div key={ft.id} style={{background:"#fff", border:"1px solid #e2e8f0",
              borderRadius:10, padding:12, marginBottom:10}}>
              <div style={{display:"flex", gap:8, marginBottom:8, alignItems:"center"}}>
                <input
                  type="text"
                  value={ft.label||""}
                  placeholder="Feldbezeichnung eingeben…"
                  onChange={e=>{
                    const neu = [...(s.freitextFelder||[])];
                    neu[fi] = {...neu[fi], label: e.target.value};
                    onChange("freitextFelder", neu);
                  }}
                  style={{...SI, flex:1, fontSize:13, padding:"9px 12px",
                    fontWeight:700, color:"#0f172a"}}/>
                <button onClick={()=>{
                  onChange("freitextFelder",
                    (s.freitextFelder||[]).filter((_,j)=>j!==fi));
                }} style={{background:"#fef2f2", border:"1px solid #fecaca",
                  color:"#ef4444", borderRadius:8, padding:"8px 12px",
                  cursor:"pointer", fontWeight:700, fontSize:13, flexShrink:0}}>
                  × Entfernen
                </button>
              </div>
              <textarea
                rows={3}
                value={ft.text||""}
                placeholder={ft.label ? `${ft.label}…` : "Text eingeben…"}
                onChange={e=>{
                  const neu = [...(s.freitextFelder||[])];
                  neu[fi] = {...neu[fi], text: e.target.value};
                  onChange("freitextFelder", neu);
                }}
                style={{...SI, resize:"vertical", fontSize:14}}/>
            </div>
          ))}
        </div>
      )}

      {/* Maßnahmen */}
      <TxtInput label="Maßnahmen / Sofortmaßnahmen" value={s.massnahmen}
        onChange={v=>onChange("massnahmen",v)} placeholder="Empfohlene Maßnahmen…" multi/>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// FORTSCHRITT
// ─────────────────────────────────────────────────────────────
function Fortschritt({schritt}) {
  const labels = ["Auftrag","Objekt","Schäden","Abschluss"];
  return (
    <div style={{display:"flex", gap:5, padding:"14px 16px 10px"}}>
      {labels.map((l,i)=>(
        <div key={i} style={{flex:1, textAlign:"center"}}>
          <div style={{height:3, borderRadius:3, marginBottom:4,
            background:i<=schritt?"#0f172a":"#e2e8f0", transition:"background .3s"}}/>
          <span style={{fontSize:9, textTransform:"uppercase", letterSpacing:.5,
            color:i<=schritt?"#0f172a":"#94a3b8",
            fontWeight:i===schritt?800:400}}>{l}</span>
        </div>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// PROTOKOLL VORSCHAU
// ─────────────────────────────────────────────────────────────
function Karte({titel, children}) {
  return (
    <div style={{background:"#fff", borderRadius:12, border:"1px solid #e2e8f0",
      overflow:"hidden", marginBottom:12, boxShadow:"0 1px 4px #0000000a"}}>
      <div style={{background:"#f8fafc", padding:"9px 14px",
        borderBottom:"1px solid #e2e8f0", fontWeight:800,
        fontSize:13, color:"#0f172a"}}>{titel}</div>
      <div>{children}</div>
    </div>
  );
}

function Zeile({k, v}) {
  if (!v && v !== 0) return null;
  return (
    <div style={{display:"flex", gap:10, padding:"7px 14px",
      borderBottom:"1px solid #f8fafc", alignItems:"flex-start"}}>
      <span style={{fontSize:12, color:"#64748b", minWidth:120,
        flexShrink:0, fontWeight:600, paddingTop:1}}>{k}</span>
      <span style={{fontSize:14, color:"#0f172a", flex:1, lineHeight:1.5}}>{v}</span>
    </div>
  );
}

// ── Gutachten Word Export (reiner Text → docx) ─────────────
async function exportiereGutachten(text, daten) {
  const heute = new Date().toLocaleDateString("de-AT",{day:"2-digit",month:"2-digit",year:"numeric"});
  const dateiname = `${(daten.nr||"Entwurf").replace(/[^a-zA-Z0-9\-]/g,"_")}_Gutachten.docx`;
  const DOCX_MIME = "application/vnd.openxmlformats-officedocument.wordprocessingml.document";
  const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  // Text in Paragraphen aufteilen, Überschriften erkennen (1. 2. 3. am Zeilenanfang)
  const zeilen = text.split('\n');
  let bodyXml = '';

  // Titelzeile
  bodyXml += `<w:p><w:pPr><w:spacing w:before="0" w:after="200"/></w:pPr>
    <w:r><w:rPr><w:b/><w:sz w:val="48"/><w:color w:val="0F172A"/></w:rPr><w:t>GUTACHTEN</w:t></w:r></w:p>
  <w:p><w:pPr><w:spacing w:before="0" w:after="60"/></w:pPr>
    <w:r><w:rPr><w:sz w:val="18"/><w:color w:val="555555"/></w:rPr><w:t>Schaden-Nr.: ${esc(daten.nr||"–")}  ·  ${esc(daten.adresse||"–")}  ·  ${esc(heute)}</w:t></w:r></w:p>
  <w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="8" w:color="1E3A5F"/></w:pBdr><w:spacing w:before="0" w:after="240"/></w:pPr></w:p>`;

  zeilen.forEach(z => {
    const t = z.trim();
    if (!t) {
      bodyXml += `<w:p><w:pPr><w:spacing w:before="0" w:after="60"/></w:pPr></w:p>`;
      return;
    }
    // Hauptüberschrift: "1. Auftrag" etc.
    const isH1 = /^\d+\.\s+\S/.test(t) && t.length < 60;
    // Unterüberschrift: "1.1" oder "**Text**" oder "Position"
    const isH2 = /^\d+\.\d+/.test(t) || /^Position \d/i.test(t);
    // Bold-Marker **text**
    const cleaned = t.replace(/\*\*/g, '');

    if (isH1) {
      bodyXml += `<w:p><w:pPr><w:spacing w:before="280" w:after="80"/></w:pPr>
        <w:r><w:rPr><w:b/><w:sz w:val="26"/><w:color w:val="1E3A5F"/></w:rPr><w:t>${esc(cleaned)}</w:t></w:r></w:p>`;
    } else if (isH2) {
      bodyXml += `<w:p><w:pPr><w:spacing w:before="160" w:after="60"/></w:pPr>
        <w:r><w:rPr><w:b/><w:sz w:val="20"/></w:rPr><w:t>${esc(cleaned)}</w:t></w:r></w:p>`;
    } else {
      bodyXml += `<w:p><w:pPr><w:spacing w:before="0" w:after="80"/><w:ind w:firstLine="0"/></w:pPr>
        <w:r><w:rPr><w:sz w:val="20"/></w:rPr><w:t xml:space="preserve">${esc(cleaned)}</w:t></w:r></w:p>`;
    }
  });

  // Unterschriften
  bodyXml += `<w:p><w:pPr><w:spacing w:before="600" w:after="0"/></w:pPr></w:p>
  <w:tbl><w:tblPr><w:tblW w:w="8880" w:type="dxa"/><w:tblBorders><w:top w:val="none"/><w:left w:val="none"/><w:bottom w:val="none"/><w:right w:val="none"/><w:insideH w:val="none"/><w:insideV w:val="none"/></w:tblBorders></w:tblPr>
    <w:tblGrid><w:gridCol w:w="4440"/><w:gridCol w:w="4440"/></w:tblGrid>
    <w:tr>
      <w:tc><w:tcPr><w:tcW w:w="4440" w:type="dxa"/><w:tcBorders><w:top w:val="single" w:sz="12" w:color="999999"/><w:left w:val="none"/><w:bottom w:val="none"/><w:right w:val="none"/></w:tcBorders></w:tcPr>
        <w:p><w:pPr><w:spacing w:before="80"/></w:pPr><w:r><w:rPr><w:color w:val="777777"/><w:sz w:val="16"/></w:rPr><w:t>Datum und Ort</w:t></w:r></w:p></w:tc>
      <w:tc><w:tcPr><w:tcW w:w="4440" w:type="dxa"/><w:tcBorders><w:top w:val="single" w:sz="12" w:color="999999"/><w:left w:val="none"/><w:bottom w:val="none"/><w:right w:val="none"/></w:tcBorders></w:tcPr>
        <w:p><w:pPr><w:spacing w:before="80"/></w:pPr><w:r><w:rPr><w:color w:val="777777"/><w:sz w:val="16"/></w:rPr><w:t>Unterschrift Sachverstaendiger</w:t></w:r></w:p></w:tc>
    </w:tr></w:tbl>
  <w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="300"/></w:pPr>
    <w:r><w:rPr><w:color w:val="AAAAAA"/><w:sz w:val="14"/></w:rPr><w:t>${esc(GUTACHTER)}  ·  ${esc(heute)}</w:t></w:r></w:p>`;

  const docXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
  xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
<w:body>${bodyXml}
<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1080" w:right="1080" w:bottom="1080" w:left="1080"/></w:sectPr>
</w:body></w:document>`;

  const stylesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:docDefaults><w:rPrDefault><w:rPr>
    <w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/>
    <w:sz w:val="20"/><w:szCs w:val="20"/>
  </w:rPr></w:rPrDefault></w:docDefaults>
</w:styles>`;

  const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>
</Types>`;

  const rootRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

  const wordRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
</Relationships>`;

  try {
    const zip = new JSZip();
    zip.file("[Content_Types].xml", contentTypes);
    zip.file("_rels/.rels", rootRels);
    zip.file("word/document.xml", docXml);
    zip.file("word/styles.xml", stylesXml);
    zip.file("word/_rels/document.xml.rels", wordRels);

    const blob = await zip.generateAsync({ type:"blob", mimeType:DOCX_MIME, compression:"DEFLATE" });
    const file = new File([blob], dateiname, { type: DOCX_MIME });
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
    if (isIOS && navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
      try { await navigator.share({files:[file], title:dateiname}); return; } catch(e){ if(e.name==="AbortError")return; }
    }
    const url = URL.createObjectURL(file);
    const a = document.createElement("a");
    a.href=url; a.download=dateiname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),15000);
  } catch(e) { alert("Export fehlgeschlagen:\n"+e.message); }
}

function ProtokollAnsicht({daten, onBack, onNew, onExport}) {
  const heute  = new Date().toLocaleDateString("de-AT",{day:"2-digit",month:"2-digit",year:"numeric"});
  const kaA    = a => (Array.isArray(a) && a.length) ? a.join(", ") : null;
  const fmt    = v => v||null;

  // ── KI-Gutachten State ──
  const [apiKey,      setApiKey]      = useState(() => localStorage.getItem("gutachten-api-key")||"");
  const [apiKeyInput, setApiKeyInput] = useState("");
  const [showKeyForm, setShowKeyForm] = useState(false);
  const [gutachten,   setGutachten]   = useState("");
  const [laedt,       setLaedt]       = useState(false);
  const [fehler,      setFehler]      = useState("");

  const speichereKey = () => {
    localStorage.setItem("gutachten-api-key", apiKeyInput.trim());
    setApiKey(apiKeyInput.trim());
    setShowKeyForm(false);
  };

  const generiereGutachten = async () => {
    if (!apiKey) { setShowKeyForm(true); return; }
