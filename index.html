    setLaedt(true); setFehler(""); setGutachten("");

    // Daten für Prompt aufbereiten
    const ka = x => x ? (Array.isArray(x) ? x.join(", ") : String(x)) : "–";
    const schadenTxt = (daten.schaeden||[]).map((s,i) => {
      const extra = s.extraFelder||[];
      const pers  = (s.personen||[]).map(p=>`${p.name}${p.status?" ("+p.status+")":""}`).join(", ");
      const fl    = (s.flaechen||[]).filter(f=>f.typ||f.m2).map(f=>{
          const abm   = f.raumL&&f.raumB ? ` (${f.raumL}×${f.raumB}m)` : "";
          const hoehe = f.hoehe==="__custom__"?(f.hoeheFreitext?` H:${f.hoeheFreitext}m`:""):(f.hoehe?` H:${f.hoehe}`:"");
          return `${f.typ}: ${f.m2} m²${abm}${hoehe}`;
        }).join(", ");
      return `Position ${i+1}:
  TOP/Wohnung: ${ka(s.top)} | Geschoss: ${ka(s.geschoss)}
  Anwesende: ${pers||"–"}
  Räume: ${ka(s.raeume)} | Materialien: ${ka(s.materialien)}
  Flächen: ${fl||"–"}
  Angaben vor Ort: ${ka(s.angabenVorOrt)}
  Ursache: ${ka(s.ursache)}
  Schadensbeschreibung: ${ka(s.beschreibung)}
  Technische Trocknung: ${s.trocknung_vorhanden==="Ja"?"Vorhanden – "+(s.trocknung_art||[]).join(", "):s.trocknung_vorhanden==="Empfohlen"?"Erforderlich, noch nicht ausgeführt – "+(s.trocknung_art||[]).join(", "):(s.trocknung_vorhanden||"–")}
  Maßnahmen: ${ka(s.massnahmen)}
  Freitext: ${(s.freitextFelder||[]).map(f=>f.label+": "+f.text).join(" | ")||"–"}`;
    }).join("\n\n");

    const anwTxt = (() => {
      const basis = daten.anwesende||[];
      const pos   = (daten.schaeden||[]).flatMap(s=>(s.personen||[]).filter(p=>p.name).map(p=>p.name));
      return [...new Set([...basis.map(p=>p.name), ...pos])].filter(Boolean).join(", ") || "–";
    })();

    const prompt = `Du bist ${GUTACHTER}, österreichischer Sachverständiger und Architekt für Bau- und Gebäudeschäden.

Erstelle ein vollständiges, professionelles Gutachten auf Basis dieser Besichtigungsdaten. Schreibe in sachlichem österreichischem Deutsch mit Fachterminologie. Verwende passive Formulierungen ("wurde festgestellt", "konnte ermittelt werden", "ist festzustellen"). Bei Angaben Dritter: Konjunktiv ("soll", "laut Angaben", "wurde mitgeteilt"). Sei präzise und technisch korrekt.

BESICHTIGUNGSDATEN:
Schaden-Nr.: ${ka(daten.nr)}
Auftragsart: ${ka((daten.auftragsart||[]).join(", "))}
Auftraggeber: ${ka(daten.auftraggeber)}
Besichtigungsdatum: ${ka(daten.datum)}
Schadendatum: ${ka(daten.schadendatum)}
Besichtigungszustand: ${ka(daten.besichtigungszustand)}
Objekt: ${ka(daten.objekt)} | Adresse: ${ka(daten.adresse)}
Baujahr: ${ka(daten.baujahr)} | Gebäudezustand: ${ka(daten.gebaeudezustand)}
Schadensart: ${ka(daten.schadensart)} | Unterkategorie: ${ka(daten.schadensart_sub)}
Anwesende Personen: ${anwTxt}
Behördliche Aufnahme: ${ka(daten.behoerdliche_aufnahme)} | Bewohnt: ${ka(daten.bewohnt)}
Alter der Ursache: ${ka(daten.alter_ursache)} | Zustand: ${ka(daten.zustand_ursache)}
Regressmöglichkeit: ${ka(daten.regressmoeglichkeit)}
Regress Erörterung: ${ka(daten.regressFreitext)}
Partnerfirma: ${daten.partnerfirma==="Sonstige"?ka(daten.partnerfirma_sonstige):ka(daten.partnerfirma)}
Allgemeine Bemerkungen: ${ka(daten.bemerkungen)}

SCHADENPOSITIONEN:
${schadenTxt}

Erstelle das Gutachten mit diesen Abschnitten (nummeriert):
1. Auftrag
2. Objekt  
3. Sachverhalt / Schadenshergang
4. Befund (je Unterabschnitt pro Schadensposition)
5. Ursacheneruierung
6. Empfohlene Maßnahmen
7. Zusammenfassung

Gib NUR den Gutachtentext zurück, keine Erklärungen, keine Markdown-Codeblöcke.`;

    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-opus-4-5",
          max_tokens: 4000,
          messages: [{ role: "user", content: prompt }]
        })
      });
      if (!resp.ok) {
        const err = await resp.json().catch(()=>({}));
        throw new Error(err.error?.message || `HTTP ${resp.status}`);
      }
      const data = await resp.json();
      const txt  = (data.content||[]).map(b=>b.text||"").join("").trim();
      setGutachten(txt);
    } catch(e) {
      setFehler("Fehler: " + e.message);
    } finally {
      setLaedt(false);
    }
  };

  return (
    <div style={{fontFamily:"inherit", background:"#f8fafc", minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0f172a,#1e3a5f)",
        color:"#fff", padding:"24px 18px 20px"}}>
        <div style={{fontSize:11, opacity:.5, textTransform:"uppercase",
          letterSpacing:2, marginBottom:4}}>Protokoll bereit</div>
        <div style={{fontSize:21, fontWeight:800}}>
          {kaA(daten.objekt) || "Besichtigungsprotokoll"}
        </div>
        <div style={{fontSize:13, opacity:.65, marginTop:2}}>{daten.adresse||""}</div>
      </div>

      <div style={{padding:"18px 18px 0"}}>

        {/* Export Button */}
        {(()=>{
          const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
            (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
          return (<>
            <button onClick={onExport} style={{
              width:"100%", padding:18, borderRadius:14, border:"none",
              background:"linear-gradient(135deg,#2563eb,#0f172a)",
              color:"#fff", fontWeight:800, fontSize:18, cursor:"pointer",
              marginBottom:6, display:"flex", alignItems:"center",
              justifyContent:"center", gap:10
            }}>
              📥 Als Word speichern (.docx)
            </button>
            {isIOS
              ? <div style={{background:"#eff6ff", border:"1px solid #bfdbfe",
                  borderRadius:10, padding:"10px 14px", marginBottom:20,
                  fontSize:13, color:"#1e40af", lineHeight:1.6}}>
                  <div style={{fontWeight:800, marginBottom:4}}>📱 iPad / iPhone</div>
                  Es öffnet sich das iOS-Teilen-Menü — dort auswählen:<br/>
                  <strong>In Word öffnen</strong> oder <strong>In Pages öffnen</strong> oder <strong>In Dateien sichern</strong>
                </div>
              : <p style={{textAlign:"center", fontSize:13, color:"#64748b", marginBottom:20}}>
                  In Word oder Pages öffnen → als PDF exportieren
                </p>
            }
          </>);
        })()}

        <div style={{fontWeight:800, fontSize:15, color:"#0f172a", marginBottom:12}}>Vorschau</div>

        <Karte titel="📋 Auftragsdaten">
          <Zeile k="Schadennummer"      v={fmt(daten.nr)}/>
            {(daten.auftragsart||[]).length>0 && <Zeile k="Auftragsart" v={(daten.auftragsart||[]).join(", ")}/>}
          <Zeile k="Auftraggeber"       v={fmt(daten.auftraggeber)}/>
          <Zeile k="Besichtigungsdatum" v={fmt(daten.datum)}/>
          <Zeile k="Schadendatum"       v={fmt(daten.schadendatum)}/>
          <Zeile k="Besichtigungszustand" v={fmt(daten.besichtigungszustand)}/>
          <Zeile k="Sachverständiger"   v={fmt(daten.gutachter)}/>
        </Karte>

        <Karte titel="🏠 Objekt">
          <Zeile k="Bezeichnung"   v={kaA(daten.objekt)}/>
          <Zeile k="Adresse"       v={fmt(daten.adresse)}/>
          <Zeile k="Baujahr"       v={fmt(daten.baujahr)}/>
          {daten.baujahr && parseInt(daten.baujahr)>1800 && (
            <Zeile k="Gebäudealter" v={`${new Date().getFullYear()-parseInt(daten.baujahr)} Jahre`}/>
          )}
          <Zeile k="Gebäudezustand" v={fmt(daten.gebaeudezustand)}/>
        </Karte>

        {(daten.schadensart||[]).includes("Leitungswasser") && daten.anwesenheit72h && (
          <Karte titel="💧 Anwesenheit 72 Stunden">
            <Zeile k="Anwesenheit 72h" v={fmt(daten.anwesenheit72h)}/>
          </Karte>
        )}

        {(daten.behoerdliche_aufnahme || daten.bewohnt || daten.alter_ursache ||
          daten.zustand_ursache || daten.regressmoeglichkeit || daten.partnerfirma) && (
          <Karte titel="🔍 Weitere Angaben">
            <Zeile k="Behördl. Aufnahme"   v={fmt(daten.behoerdliche_aufnahme)}/>
            <Zeile k="Bewohnt"             v={fmt(daten.bewohnt)}/>
            <Zeile k="Alter der Ursache"   v={fmt(daten.alter_ursache)}/>
            <Zeile k="Zustand der Ursache" v={fmt(daten.zustand_ursache)}/>
            <Zeile k="Regressmöglichkeit"  v={fmt(daten.regressmoeglichkeit)}/>
            {daten.regressFreitext && <Zeile k="Regress – Erörterung" v={daten.regressFreitext}/>}
            <Zeile k="Partnerfirma" v={daten.partnerfirma==="Sonstige" ? daten.partnerfirma_sonstige : fmt(daten.partnerfirma)}/>
          </Karte>
        )}

        {(()=>{
          const basis = daten.anwesende||[];
          const posP  = (daten.schaeden||[]).flatMap(s=>
            (s.personen||[]).filter(p=>p.name&&p.name.trim()).map(p=>({
              name:  p.name.trim(),
              rolle: p.status==="Sonstige"&&p.statusFreitext ? p.statusFreitext.trim() : (p.status||"Anwesend"),
              top:   s.top||""
            }))
          );
          const namen = new Set(basis.map(p=>p.name));
          const alle  = [...basis, ...posP.filter(p=>!namen.has(p.name))];
          if (!alle.length) return null;
          return (
            <Karte titel="👥 Anwesende">
              {alle.map((p,i)=>(
                <Zeile key={i} k={[p.rolle, p.top].filter(Boolean).join(" · ")} v={p.name}/>
              ))}
            </Karte>
          );
        })()}

        {(daten.schadensart||[]).length > 0 && (
          <Karte titel="⚡ Schadensart">
            <Zeile k="Schadensart"   v={kaA(daten.schadensart)}/>
            <Zeile k="Unterkategorie" v={kaA(daten.schadensart_sub)}/>
          </Karte>
        )}

        {(daten.schaeden||[]).map((s,i)=>{
          const istPos1 = i === 0;
          const extra   = s.extraFelder||[];
          const flArr   = (s.flaechen||[]).filter(f=>f.typ||f.m2);
          const titelTop = [s.top, s.geschoss].filter(Boolean).join(" · ");
          const titelSuffix = titelTop ? ` – ${titelTop}` : "";
          return (
            <Karte key={i} titel={`🔍 Position ${i+1}${titelSuffix}`}>
              <Zeile k="TOP / Wohnung" v={s.top||null}/>
              <Zeile k="Geschoss"      v={s.geschoss||null}/>
              <Zeile k="Räume"      v={(s.raeume||[]).join(", ")||null}/>
              <Zeile k="Materialien" v={(s.materialien||[]).join(", ")||null}/>
              {flArr.length>0 && <Zeile k="Flächen" v={flArr.map(f=>{
                const abm   = f.raumL&&f.raumB ? ` (${f.raumL}×${f.raumB}m)` : "";
                const hoehe = f.hoehe==="__custom__"?(f.hoeheFreitext?` H:${f.hoeheFreitext}m`:""):(f.hoehe?` H:${f.hoehe}`:"");
                return `${f.typ||"–"}: ${f.m2||0} m²${abm}${hoehe}`;
              }).join(" | ")}/>}
              {flArr.filter(f=>f.skizze).map((f,fi)=>(
                <div key={fi} style={{padding:"8px 14px"}}>
                  <div style={{fontSize:11, color:"#64748b", fontWeight:700, marginBottom:4}}>Skizze – {f.typ||`Fläche ${fi+1}`}</div>
                  <img src={f.skizze} style={{width:"100%", borderRadius:8, border:"1px solid #e2e8f0"}}/>
                </div>
              ))}
              {(istPos1||extra.includes("Ursacheneruierung")) && <Zeile k="Angaben vor Ort" v={s.angabenVorOrt}/>}
              {(istPos1||extra.includes("Ursacheneruierung")) && <Zeile k="Ursache" v={s.ursache}/>}
              {(istPos1||extra.includes("Schadensbeschreibung")) && <Zeile k="Beschreibung" v={s.beschreibung}/>}
              {(s.freitextFelder||[]).map(ft=>(
                <Zeile key={ft.id} k={ft.label||"Freitext"} v={ft.text}/>
              ))}
              {s.skizze && (
                <div style={{padding:"8px 14px"}}>
                  <div style={{fontSize:11, color:"#64748b", fontWeight:700, marginBottom:6}}>Skizze</div>
                  <img src={s.skizze} style={{width:"100%", borderRadius:8, border:"1px solid #e2e8f0"}}/>
                </div>
              )}
              {s.trocknung_vorhanden && (
                <Zeile k="Techn. Trocknung" v={
                  s.trocknung_vorhanden==="Ja"
                    ? "Vorhanden" + ((s.trocknung_art||[]).length?" – "+s.trocknung_art.join(", "):"")
                    : s.trocknung_vorhanden==="Empfohlen"
                      ? "Erforderlich, noch nicht ausgeführt" + ((s.trocknung_art||[]).length?" – "+s.trocknung_art.join(", "):"")
                      : "Nicht erforderlich"
                }/>
              )}
              <Zeile k="Maßnahmen" v={s.massnahmen}/>
            </Karte>
          );
        })}

        {daten.bemerkungen && (
          <Karte titel="📝 Bemerkungen">
            <p style={{padding:"8px 14px 12px", color:"#334155", lineHeight:1.7}}>
              {daten.bemerkungen}
            </p>
          </Karte>
        )}

        <div style={{display:"flex", gap:12, marginTop:8, marginBottom:10}}>
          {["Datum & Ort","Unterschrift Sachverständiger","Unterschrift Anwesende"].map(t=>(
            <div key={t} style={{flex:1, borderTop:"2px solid #cbd5e1", paddingTop:7,
              fontSize:10, color:"#94a3b8", textAlign:"center"}}>{t}</div>
          ))}
        </div>
        <p style={{textAlign:"center", fontSize:11, color:"#94a3b8", marginBottom:24}}>
          {heute} · {daten.nr||"–"} · {GUTACHTER}
        </p>

        {/* ── KI-Gutachten Generator ── */}
        <div style={{background:"linear-gradient(135deg,#1e3a5f,#0f172a)", borderRadius:14,
          padding:16, marginBottom:16}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
            <div>
              <div style={{color:"#fff", fontWeight:800, fontSize:15}}>🤖 KI-Gutachten</div>
              <div style={{color:"#94a3b8", fontSize:11, marginTop:2}}>Automatisch generiert aus Besichtigungsdaten</div>
            </div>
            <button onClick={()=>setShowKeyForm(v=>!v)}
              style={{background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.2)",
                color:apiKey?"#86efac":"#fca5a5", borderRadius:8, padding:"5px 10px",
                fontSize:11, cursor:"pointer", fontWeight:700}}>
              {apiKey ? "✓ API-Key" : "⚠ API-Key"}
            </button>
          </div>

          {showKeyForm && (
            <div style={{background:"rgba(0,0,0,0.3)", borderRadius:10, padding:12, marginBottom:10}}>
              <div style={{color:"#94a3b8", fontSize:11, marginBottom:6}}>
                Anthropic API-Key eingeben (einmalig, wird lokal gespeichert):
              </div>
              <div style={{display:"flex", gap:8}}>
                <input type="password" value={apiKeyInput}
                  onChange={e=>setApiKeyInput(e.target.value)}
                  placeholder="sk-ant-..."
                  style={{flex:1, padding:"8px 10px", borderRadius:8, border:"1px solid #475569",
                    background:"#1e293b", color:"#fff", fontSize:13}}/>
                <button onClick={speichereKey}
                  style={{background:"#2563eb", color:"#fff", border:"none",
                    borderRadius:8, padding:"8px 14px", fontWeight:700, fontSize:13, cursor:"pointer"}}>
                  Speichern
                </button>
              </div>
              <div style={{color:"#64748b", fontSize:10, marginTop:6}}>
                API-Key unter console.anthropic.com erstellen · Kosten: ~0,01 € pro Gutachten
              </div>
            </div>
          )}

          <button onClick={generiereGutachten} disabled={laedt}
            style={{width:"100%", padding:"12px 0", borderRadius:10,
              background: laedt ? "#374151" : "#2563eb",
              color:"#fff", border:"none", fontWeight:800, fontSize:14,
              cursor: laedt ? "default" : "pointer", marginBottom: gutachten||fehler ? 10 : 0}}>
            {laedt ? "⏳ Gutachten wird generiert…" : "✨ Gutachten generieren"}
          </button>

          {fehler && (
            <div style={{background:"rgba(239,68,68,0.15)", border:"1px solid rgba(239,68,68,0.3)",
              borderRadius:8, padding:10, color:"#fca5a5", fontSize:12}}>
              {fehler}
            </div>
          )}

          {gutachten && (
            <div>
              <div style={{background:"#0f172a", borderRadius:10, padding:12, marginBottom:8,
                maxHeight:320, overflowY:"auto"}}>
                <pre style={{color:"#e2e8f0", fontSize:12, lineHeight:1.7, margin:0,
                  whiteSpace:"pre-wrap", fontFamily:"inherit"}}>
                  {gutachten}
                </pre>
              </div>
              <div style={{display:"flex", gap:8}}>
                <button onClick={()=>exportiereGutachten(gutachten, daten)}
                  style={{flex:1, padding:"10px 0", borderRadius:9,
                    background:"#16a34a", color:"#fff", border:"none",
                    fontWeight:800, fontSize:13, cursor:"pointer"}}>
                  📄 Als Word exportieren
                </button>
                <button onClick={()=>setGutachten("")}
                  style={{padding:"10px 14px", borderRadius:9,
                    background:"rgba(255,255,255,0.1)", color:"#94a3b8",
                    border:"1px solid rgba(255,255,255,0.15)", fontSize:13, cursor:"pointer"}}>
                  ✕
                </button>
              </div>
            </div>
          )}
        </div>

        <div style={{display:"flex", gap:10, paddingBottom:40}}>
          <button onClick={onBack} style={{flex:1, padding:14, borderRadius:12,
            border:"2px solid #e2e8f0", background:"#fff", fontWeight:700,
            fontSize:14, cursor:"pointer", color:"#0f172a"}}>← Bearbeiten</button>
          <button onClick={onNew} style={{flex:1, padding:14, borderRadius:12,
            background:"#0f172a", color:"#fff", border:"none",
            fontWeight:700, fontSize:14, cursor:"pointer"}}>+ Neues Gutachten</button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// GUTACHTEN-EXPORT (für Gutachten Generator)
// ─────────────────────────────────────────────────────────────
function erstelleGutachtenExport(daten) {
  const id = `besichtigung_${Date.now()}`;
  const alleRaeume  = [...new Set((daten.schaeden||[]).flatMap(s => s.raeume||[]))];
  const alleMat     = [...new Set((daten.schaeden||[]).flatMap(s => s.materialien||[]))];
  const alleUrsachen= (daten.schaeden||[]).map(s => s.ursache).filter(Boolean).join("; ");
  const alleBefunde = (daten.schaeden||[]).map(s => s.angabenVorOrt).filter(Boolean).join("; ");
  const alleSchaden = (daten.schaeden||[]).map((s,i) =>
    `Position ${i+1}${s.top?" ("+s.top+")":""}${s.positionstyp?" ["+s.positionstyp+"]":""}: ${
      [s.beschreibung,
       s.raeume&&s.raeume.join(", "),
       s.materialien&&s.materialien.join(", "),
       s.feuchtigkeitswerte&&("Feuchte: "+s.feuchtigkeitswerte)
      ].filter(Boolean).join(" | ")}`
  ).join("\n");
  return {
    exportId: id,
    exportTimestamp: new Date().toISOString(),
    exportLabel: `${daten.adresse||"Unbekannt"} – ${daten.datum||""}`,
    source: "besichtigungsaufnahme",
    // Stammdaten
    nr: daten.nr||"",
    auftraggeber: daten.auftraggeber||"",
    datum: daten.datum||"",
    schadendatum: daten.schadendatum||"",
    gutachter: daten.gutachter||"",
    // Objekt
    adresse: daten.adresse||"",
    objekt: Array.isArray(daten.objekt) ? daten.objekt.join(", ") : (daten.objekt||""),
    baujahr: daten.baujahr||"",
    gebaeudezustand: daten.gebaeudezustand||"",
    bewohnt: daten.bewohnt||"",
    // Schadensart
    schadensart: Array.isArray(daten.schadensart) ? daten.schadensart.join(", ") : "",
    schadensart_sub: Array.isArray(daten.schadensart_sub) ? daten.schadensart_sub.join(", ") : "",
    // Ursache
    alter_ursache: daten.alter_ursache||"",
    zustand_ursache: daten.zustand_ursache||"",
    regressmoeglichkeit: daten.regressmoeglichkeit||"",
    regressFreitext: daten.regressFreitext||"",
    behoerdliche_aufnahme: daten.behoerdliche_aufnahme||"",
    // Schaden (zusammengefasst für Gutachten Generator)
    ursacheAnalyse: alleUrsachen,
    ursacheBefund: alleBefunde,
    schadenBeschreibung: alleSchaden,
    schadenRaeume: alleRaeume.join(", "),
    schadenMaterialien: alleMat.join(", "),
    // Rohdata für vollständige Verarbeitung
    schaeden: daten.schaeden||[],
    // Getrennte Listen für Gutachten
    positionen_ursachenbehebung: (daten.schaeden||[]).filter(s=>s.positionstyp==="Ursachenbehebung").map((s,i)=>({
      top: s.top||"", geschoss: s.geschoss||"",
      raeume: (s.raeume||[]).join(", "), materialien: (s.materialien||[]).join(", "),
      beschreibung: s.beschreibung||"", ursache: s.ursache||"",
      feuchtigkeitswerte: s.feuchtigkeitswerte||"",
      leckortung: s.leckortung||"",
      sanierung_partiell: s.sanierung_partiell||"",
      sanierung_ausmass: s.sanierung_ausmass||"",
      firmen: (s.firmen||[]).map(f=>[f.name,f.handwerk].filter(Boolean).join(" – ")),
      flaechen: (s.flaechen||[]).filter(f=>f.typ||f.m2).map(f=>
        `${f.typ}: ${f.m2||"–"}m²${f.alter?" ("+f.alter+")":" "}${f.raumL&&f.raumB?" ("+f.raumL+"×"+f.raumB+"m)":""}`
      ).join(", "),
    })),
    positionen_folgeschaden: (daten.schaeden||[]).filter(s=>s.positionstyp==="Folgeschaden").map((s,i)=>({
      top: s.top||"", geschoss: s.geschoss||"",
      raeume: (s.raeume||[]).join(", "), materialien: (s.materialien||[]).join(", "),
      beschreibung: s.folgeschaden_beschreibung || s.beschreibung||"",
      feuchtigkeitswerte: s.feuchtigkeitswerte||"",
      sanierung_partiell: s.sanierung_partiell||"",
      sanierung_ausmass: s.sanierung_ausmass||"",
      firmen: (s.firmen||[]).map(f=>[f.name,f.handwerk].filter(Boolean).join(" – ")),
      flaechen: (s.flaechen||[]).filter(f=>f.typ||f.m2).map(f=>
        `${f.typ}: ${f.m2||"–"}m²${f.alter?" ("+f.alter+")":" "}${f.raumL&&f.raumB?" ("+f.raumL+"×"+f.raumB+"m)":""}`
      ).join(", "),
    })),
    anwesende: daten.anwesende||[],
    bemerkungen: daten.bemerkungen||"",
    partnerfirma: daten.partnerfirma==="Sonstige" ? (daten.partnerfirma_sonstige||"") : (daten.partnerfirma||""),
  };
}

// ─────────────────────────────────────────────────────────────
// HAUPT APP
// ─────────────────────────────────────────────────────────────
function App() {
  const [schritt, setSchritt] = useState(0);
  const [daten,   setDaten]   = useState(() => ladeDaten());
  const [ansicht, setAnsicht] = useState("formular"); // "formular" | "protokoll"
  const [geo,     setGeo]     = useState("idle");
  const [exportiert, setExportiert] = useState(false);

  // Autosave bei jeder Änderung
  useEffect(() => { speichereDaten(daten); }, [daten]);

  const set = (f, v) => setDaten(d => ({...d, [f]:v}));

  const setSchaden = (i, f, v) => setDaten(d => {
    const c = [...(d.schaeden||[])];
    c[i] = {...c[i], [f]:v};
    return {...d, schaeden:c};
  });

  const standort = useCallback(() => {
    if (!navigator.geolocation) { setGeo("fehler"); return; }
    setGeo("laden");
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const addr = await holAdresse(pos.coords.latitude, pos.coords.longitude);
        set("adresse", addr);
        setGeo("ok");
      },
      () => setGeo("fehler"),
      { enableHighAccuracy:true, timeout:15000, maximumAge:30000 }
    );
  }, []);

  useEffect(() => {
    if (schritt === 1 && geo === "idle") standort();
  }, [schritt]);

  // ── Protokoll Ansicht ──
  if (ansicht === "protokoll") {
    return (
      <div style={{maxWidth:680, margin:"0 auto"}}>
        <ProtokollAnsicht
          daten={daten}
          onBack={()=>setAnsicht("formular")}
          onNew={()=>{
            const nd = neueDaten();
            setDaten(nd);
            speichereDaten(nd);
            setSchritt(0);
            setAnsicht("formular");
            setGeo("idle");
          }}
          onExport={()=>exportiereWord(daten)}
        />
      </div>
    );
  }

  // ── Geo-Status ──
  const geoIcon  = {idle:"📍",laden:"⏳",ok:"✅",fehler:"❌"}[geo];
  const geoColor = {idle:"#94a3b8",laden:"#2563eb",ok:"#16a34a",fehler:"#dc2626"}[geo];
  const geoMsg   = {
    idle:  "Tippe für aktuellen Standort",
    laden: "Standort wird ermittelt…",
    ok:    "Standort automatisch eingetragen",
    fehler:"Nicht verfügbar – manuell eingeben"
  }[geo];

  return (
    <div style={{maxWidth:600, margin:"0 auto", background:"#f8fafc", minHeight:"100vh"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0f172a,#1e3a5f)",
        padding:"26px 18px 18px", color:"#fff"}}>
        <div style={{fontSize:10, opacity:.45, textTransform:"uppercase",
          letterSpacing:2, marginBottom:4}}>Schadensgutachten</div>
        <div style={{fontSize:23, fontWeight:800, letterSpacing:-.5}}>Besichtigung</div>
        <div style={{fontSize:13, opacity:.55, marginTop:2}}>
          {new Date().toLocaleDateString("de-AT",{weekday:"long",day:"numeric",month:"long"})}
        </div>
      </div>

      <Fortschritt schritt={schritt}/>

      <div style={{padding:"4px 16px 110px"}}>

        {/* ── SCHRITT 0: Auftragsdaten ── */}
        {schritt===0 && <>
          <h2 style={{fontSize:18,fontWeight:800,color:"#0f172a",margin:"6px 0 16px"}}>Auftragsdaten</h2>
          <TxtInput label="Schadennummer / Aktenzeichen" value={daten.nr}
            onChange={v=>set("nr",v)} placeholder="z.B. 2024-0123"/>
          <MultiSel label="Auftragsart" opts={["Inventar","Gebäude"]}
            selected={daten.auftragsart||[]}
            onToggle={v=>{
              const cur = daten.auftragsart||[];
              set("auftragsart", cur.includes(v) ? cur.filter(x=>x!==v) : [...cur,v]);
            }} color="#0f172a"/>
          <Sel label="Auftraggeber / Versicherung" opts={AUFTRAGGEBER}
            value={daten.auftraggeber} onChange={v=>set("auftraggeber",v)}/>
          <TxtInput label="Sachverständiger" value={daten.gutachter}
            onChange={v=>set("gutachter",v)}/>
          <F label="Besichtigungsdatum">
            <input type="date" value={daten.datum||""}
              onChange={e=>set("datum",e.target.value)} style={SI}/>
          </F>
          <F label="Schadendatum">
            <input type="date" value={daten.schadendatum||""}
              onChange={e=>set("schadendatum",e.target.value)} style={SI}/>
          </F>
          <Sel label="Besichtigungszustand" opts={["Unsaniert","Teilsaniert","Saniert"]}
            value={daten.besichtigungszustand} onChange={v=>set("besichtigungszustand",v)}/>
        </>}

        {/* ── SCHRITT 1: Objekt & Personen ── */}
        {schritt===1 && <>
          <h2 style={{fontSize:18,fontWeight:800,color:"#0f172a",margin:"6px 0 16px"}}>Objekt & Personen</h2>

          <MultiSel label="Objektbezeichnung" opts={OBJEKTARTEN}
            selected={daten.objekt||[]}
            onToggle={v=>{
              const cur = daten.objekt||[];
              set("objekt", cur.includes(v) ? cur.filter(x=>x!==v) : [...cur,v]);
            }} color="#0f172a"/>

          <F label="Adresse">
            <div style={{display:"flex", gap:8}}>
              <input type="text" value={daten.adresse||""}
                onChange={e=>set("adresse",e.target.value)}
                placeholder="Straße, PLZ, Ort" style={{...SI, flex:1}}/>
              <button onClick={standort} style={{padding:"13px 14px", borderRadius:11,
                border:"2px solid #e2e8f0", cursor:"pointer", fontSize:20, flexShrink:0,
                background:geo==="ok"?"#f0fdf4":geo==="laden"?"#eff6ff":"#fff"}}>
                {geoIcon}
              </button>
            </div>
            <p style={{fontSize:12, marginTop:5, color:geoColor}}>📍 {geoMsg}</p>
          </F>

          <Anwesende list={daten.anwesende||[]} setList={v=>set("anwesende",v)}/>

          {/* Baujahr + Gebäudealter */}
          <F label="Baujahr">
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <input type="number" min="1800" max={new Date().getFullYear()}
                value={daten.baujahr||""} placeholder="z.B. 1985"
                onChange={e=>set("baujahr",e.target.value)}
                style={{...SI,flex:1}}/>
              {daten.baujahr && parseInt(daten.baujahr) > 1800 && (
                <div style={{background:"#f0f9ff",border:"1px solid #bae6fd",
                  borderRadius:10,padding:"10px 16px",flexShrink:0,textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#0284c7",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>Gebäudealter</div>
                  <div style={{fontSize:22,fontWeight:900,color:"#0f172a"}}>
                    {new Date().getFullYear() - parseInt(daten.baujahr)}
                  </div>
                  <div style={{fontSize:11,color:"#64748b"}}>Jahre</div>
                </div>
              )}
            </div>
          </F>

          <Sel label="Gebäudezustand" opts={["Neubau","Gut","Mäßig","Schlecht"]}
            value={daten.gebaeudezustand} onChange={v=>set("gebaeudezustand",v)}/>

          {/* Schadensart */}
          <MultiSel label="Schadensart" opts={SCHADENSARTEN}
            selected={daten.schadensart||[]}
            onToggle={v=>{
              const cur = daten.schadensart||[];
              const neu = cur.includes(v) ? cur.filter(x=>x!==v) : [...cur,v];
              const validSubs = neu.flatMap(a=>UNTERKATEGORIEN[a]||[]);
              set("schadensart", neu);
              set("schadensart_sub", (daten.schadensart_sub||[]).filter(s=>validSubs.includes(s)));
            }} color="#dc2626"/>

          {/* Dynamische Unterkategorien */}
          {(daten.schadensart||[]).filter(a=>UNTERKATEGORIEN[a]).map(art=>(
            <MultiSel key={art} label={`↳ ${art} – Unterkategorie`}
              opts={UNTERKATEGORIEN[art]}
              selected={(daten.schadensart_sub||[]).filter(s=>UNTERKATEGORIEN[art].includes(s))}
              onToggle={v=>{
                const cur = daten.schadensart_sub||[];
                set("schadensart_sub", cur.includes(v) ? cur.filter(x=>x!==v) : [...cur,v]);
              }} color="#b91c1c"/>
          ))}

          {/* Leitungswasser: nur Anwesenheit 72h ist bedingt */}
          {(daten.schadensart||[]).includes("Leitungswasser") && (
            <JaNein label="Anwesenheit 72 Stunden" value={daten.anwesenheit72h} onChange={v=>set("anwesenheit72h",v)}/>
          )}

          {/* Immer sichtbare Zusatzfelder */}
          <div style={{background:"#f8fafc",border:"2px solid #e2e8f0",borderRadius:14,padding:16,marginBottom:14}}>
            <div style={{fontWeight:800,fontSize:13,color:"#0f172a",marginBottom:14}}>
              🔍 Weitere Angaben
            </div>
            <JaNein label="Behördliche Aufnahme"   value={daten.behoerdliche_aufnahme} onChange={v=>set("behoerdliche_aufnahme",v)}/>
            <JaNein label="Bewohnt"                value={daten.bewohnt} onChange={v=>set("bewohnt",v)}/>
            <F label="Alter der Ursache">
              <select value={daten.alter_ursache||""}
                onChange={e=>set("alter_ursache",e.target.value)}
                style={{...SS, color:daten.alter_ursache?"#0f172a":"#94a3b8"}}>
                <option value="">– wählen</option>
                <option value="unbekannt">Unbekannt</option>
                {Array.from({length:60},(_,i)=>i+1).map(n=>(
                  <option key={n} value={`${n} Jahr${n===1?"":"e"}`}>{n} Jahr{n===1?"":"e"}</option>
                ))}
              </select>
            </F>
            <Sel label="Zustand der Ursache" opts={["Normal","Gut","Mäßig","Sehr schlecht"]}
              value={daten.zustand_ursache} onChange={v=>set("zustand_ursache",v)}/>
            <JaNein label="Regressmöglichkeit" value={daten.regressmoeglichkeit} onChange={v=>set("regressmoeglichkeit",v)}/>
            {daten.regressmoeglichkeit === "Ja" && (
              <TxtInput label="Regress – Erörterung" value={daten.regressFreitext||""}
                onChange={v=>set("regressFreitext",v)}
                placeholder="Angaben zum Regress, Verursacher, Haftungsfrage…" multi/>
            )}
            <Sel label="Partnerfirma" opts={["MIBAG","ETS","SMS","Aquastop","Sonstige"]}
              value={daten.partnerfirma} onChange={v=>set("partnerfirma",v)}/>
            {daten.partnerfirma === "Sonstige" && (
              <TxtInput label="Partnerfirma (Sonstige)" value={daten.partnerfirma_sonstige}
                onChange={v=>set("partnerfirma_sonstige",v)} placeholder="Firmenname…"/>
            )}
          </div>
        </>}

        {/* ── SCHRITT 2: Schadensaufnahme ── */}
        {schritt===2 && <>
          <h2 style={{fontSize:18,fontWeight:800,color:"#0f172a",margin:"6px 0 16px"}}>Schadensaufnahme</h2>
          {(daten.schaeden||[]).map((s,i)=>(
            <SchadenCard key={i} s={s} idx={i}
              alleTops={(daten.schaeden||[])
                .map((sc,j)=>({
                  top:sc.top||"", geschoss:sc.geschoss||"",
                  personen:sc.personen||[]
                }))
                .filter((_,j)=>j!==i)}
              onChange={(f,v)=>setSchaden(i,f,v)}
              onRemove={()=>{
                const neu = (daten.schaeden||[]).filter((_,j)=>j!==i);
                // Mindestens 1 Position behalten
                set("schaeden", neu.length > 0 ? neu : [neuerSchaden()]);
              }}/>
          ))}
          <button onClick={()=>set("schaeden",[...(daten.schaeden||[]),neuerSchaden()])}
            style={{width:"100%", padding:14, borderRadius:12,
              border:"2px dashed #cbd5e1", background:"#f8fafc",
              color:"#64748b", fontWeight:700, fontSize:14,
              cursor:"pointer", marginBottom:8}}>
            + Weitere Schadensposition
          </button>
        </>}

        {/* ── SCHRITT 3: Abschluss ── */}
        {schritt===3 && <>
          <h2 style={{fontSize:18,fontWeight:800,color:"#0f172a",margin:"6px 0 16px"}}>Abschluss</h2>

              💾 Besichtigung als Datei speichern

              Speichert alle Besichtigungsdaten als <strong style={{color:"#fff"}}>.json Datei</strong> auf deinem Gerät. Diese Datei kannst du später im Büro im <strong style={{color:"#fff"}}>Gutachten Generator</strong> direkt hochladen.

              onClick={() => {
                const exportData = erstelleGutachtenExport(daten);
                const adresse = (daten.adresse||"Besichtigung").replace(/[^a-zA-Z0-9äöüÄÖÜß\s\-]/g,"").trim().replace(/\s+/g,"_");
                const datum   = (daten.datum||new Date().toISOString().slice(0,10)).replace(/-/g,"");
                const dateiname = `Besichtigung_${adresse}_${datum}.json`;
                const blob = new Blob([JSON.stringify(exportData, null, 2)], {type:"application/json;charset=utf-8"});
                const url  = URL.createObjectURL(blob);
                const a    = document.createElement("a");
                a.href = url; a.download = dateiname;
                document.body.appendChild(a); a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 5000);

              style={{
                width:"100%", padding:"14px 0", borderRadius:10,
                background:"linear-gradient(135deg,#2563eb,#1d4ed8)",
                color:"#fff", border:"none", fontWeight:800,
                fontSize:15, cursor:"pointer", letterSpacing:0.5,
              }}>
              💾 Datei speichern
            </button>
            <div style={{fontSize:11, color:"#475569", marginTop:10, textAlign:"center", lineHeight:1.5}}>
              Dateiname: <em style={{color:"#64748b"}}>Besichtigung_Adresse_Datum.json</em>
            </div>
          </div>
        </>}
      </div>

      {/* Navigation (fixiert unten) */}
      <div style={{position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)",
        width:"100%", maxWidth:600, background:"#fff",
        borderTop:"1px solid #e2e8f0", padding:"12px 16px",
        display:"flex", gap:10, boxSizing:"border-box",
        boxShadow:"0 -3px 14px #00000012"}}>
        {schritt > 0 && (
          <button onClick={()=>setSchritt(s=>s-1)}
            style={{flex:1, padding:14, borderRadius:12,
              border:"2px solid #e2e8f0", background:"#fff",
              fontWeight:700, fontSize:15, cursor:"pointer", color:"#0f172a"}}>
            ← Zurück
          </button>
        )}
        {schritt < 3
          ? <button onClick={()=>setSchritt(s=>s+1)}
              style={{flex:2, padding:14, borderRadius:12,
                background:"#0f172a", color:"#fff", border:"none",
                fontWeight:700, fontSize:15, cursor:"pointer"}}>
              Weiter →
            </button>
          : <button onClick={()=>setAnsicht("protokoll")}
              style={{flex:2, padding:14, borderRadius:12,
                background:"linear-gradient(135deg,#2563eb,#0f172a)",
                color:"#fff", border:"none", fontWeight:800,
                fontSize:15, cursor:"pointer"}}>
              ✓ Protokoll erstellen
            </button>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
